    </table>
  </div>`;
}

function applyLogFilters(){
  const search   = document.getElementById("lf-search")?.value.trim().toLowerCase()||"";
  const user     = document.getElementById("lf-user")?.value||"";
  const cat      = document.getElementById("lf-cat")?.value||"";
  const action   = document.getElementById("lf-action")?.value||"";
  const dateFrom = document.getElementById("lf-from")?.value||"";
  const dateTo   = document.getElementById("lf-to")?.value||"";

  window._logFilter = {search,user,cat,action,dateFrom,dateTo};

  const ACTION_CATS = {
    evals:["إرسال تقييم","حفظ مسودة"],
    qa:["إرسال تقييم الجودة","إرسال تقييل الجودة","اعتماد تقييم","إعادة التقييم","بدء مراجعة الجودة"],
    users:["إضافة مستخدم","تعديل مستخدم","تفعيل مستخدم","إيقاف مستخدم"],
    obj:["اعتراض","قبول اعتراض","رفض اعتراض"],
    security:["تسجيل دخول","محاولة دخول"],
  };

  const secLog = JSON.parse(localStorage.getItem("rms_sec_log")||"[]").map(l=>({...l,source:"security"}));
  const allLog = [...ALOG.map(l=>({...l,source:"activity"})),...secLog]
    .sort((a,b)=>new Date(b.t)-new Date(a.t));

  let filtered = allLog.filter(l=>{
    if(user   && l.user!==user) return false;
    if(action && l.action!==action) return false;
    if(cat && ACTION_CATS[cat]){
      if(!ACTION_CATS[cat].some(k=>l.action&&l.action.includes(k))) return false;
    }
    if(dateFrom){
      const fd=new Date(dateFrom); fd.setHours(0,0,0,0);
      if(new Date(l.t)<fd) return false;
    }
    if(dateTo){
      const td=new Date(dateTo); td.setHours(23,59,59,999);
      if(new Date(l.t)>td) return false;
    }
    if(search){
      const s=((l.action||"")+" "+(l.detail||"")+" "+(l.user||"")).toLowerCase();
      if(!s.includes(search)) return false;
    }
    return true;
  });

  const body = document.getElementById("log-table-body");
  if(body) body.innerHTML = buildLogTable(filtered);

  const badge = document.getElementById("log-count-badge");
  if(badge){
    badge.textContent = filtered.length;
    badge.style.background = filtered.length<allLog.length?"#b45309":"var(--g1)";
  }

  const range = document.getElementById("log-date-range");
  if(range && filtered.length){
    const oldest=new Date(filtered[filtered.length-1].t).toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});
    const newest=new Date(filtered[0].t).toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});
    range.textContent=oldest===newest?oldest:`${newest} ← ${oldest}`;
  }
}

function resetLogFilters(){
  window._logFilter={search:"",user:"",action:"",dateFrom:"",dateTo:"",cat:""};
  ["lf-search","lf-user","lf-action","lf-from","lf-to","lf-cat"].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.value="";
  });
  applyLogFilters();
}

function exportAuditExcel(){
  const secLog=JSON.parse(localStorage.getItem("rms_sec_log")||"[]").map(l=>({...l,source:"security"}));
  const allLog=[...ALOG.map(l=>({...l,source:"activity"})),...secLog].sort((a,b)=>new Date(b.t)-new Date(a.t));
  const f=window._logFilter||{};
  const ACTION_CATS={
    evals:["إرسال تقييم","حفظ مسودة"],
    qa:["إرسال تقييم الجودة","إرسال تقييل الجودة","اعتماد تقييم","إعادة التقييم","بدء مراجعة الجودة"],
    users:["إضافة مستخدم","تعديل مستخدم","تفعيل مستخدم","إيقاف مستخدم"],
    obj:["اعتراض","قبول اعتراض","رفض اعتراض"],
    security:["تسجيل دخول","محاولة دخول"],
  };
  let logs=allLog.filter(l=>{
    if(f.user&&l.user!==f.user)return false;
    if(f.action&&l.action!==f.action)return false;
    if(f.cat&&ACTION_CATS[f.cat]&&!ACTION_CATS[f.cat].some(k=>l.action&&l.action.includes(k)))return false;
    if(f.dateFrom){const fd=new Date(f.dateFrom);fd.setHours(0,0,0,0);if(new Date(l.t)<fd)return false;}
    if(f.dateTo){const td=new Date(f.dateTo);td.setHours(23,59,59,999);if(new Date(l.t)>td)return false;}
    if(f.search){const s=((l.action||"")+" "+(l.detail||"")+" "+(l.user||"")).toLowerCase();if(!s.includes(f.search.toLowerCase()))return false;}
    return true;
  });

  // بناء CSV
  const BOM = "﻿";
  const headers=["الحدث","التفاصيل","المستخدم","التاريخ","الوقت","النوع"];
  const rows=logs.map(l=>{
    const dt=new Date(l.t);
    return[
      `"${l.action||""}"`,
      `"${(l.detail||"").replace(/"/g,'""')}"`,
      `"${l.user||""}"`,
      `"${dt.toLocaleDateString("ar-SA")}"`,
      `"${dt.toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}"`,
      `"${l.source==="security"?"أمن":"نشاط"}"`,
    ].join(",");
  });

  const csv=BOM+headers.join(",")+"\n"+rows.join("\n");


  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`سجل_الأنشطة_نجم_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast("✅ تم تصدير السجل بنجاح");
}

function doChangePassword(){
  const oldP=gv("cp-old"),newP=gv("cp-new"),conP=gv("cp-con");
  if(!oldP||!newP||!conP){toast("الرجاء تعبئة جميع الحقول","#dc2626");return;}
  if(oldP!==CU.password){toast("كلمة المرور الحالية غير صحيحة","#dc2626");return;}
  const v=validateInput(newP,"password");
  if(!v.ok){toast(v.msg,"#dc2626");return;}
  if(newP!==conP){toast("كلمتا المرور غير متطابقتين","#dc2626");return;}
  const users=getUsers();
  const u=users.find(x=>x.id===CU.id);
  if(!u)return;
  u.password=newP;
  saveUsers(users);
  CU.password=newP;
  addLog("تغيير كلمة المرور",CU.name);
  addSecLog("تغيير كلمة المرور",CU.username);
  closeModal();
  toast("✅ تم تغيير كلمة المرور بنجاح");
}

function pgMonthlyReport(){
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({
      label:d.toLocaleDateString("ar-SA",{year:"numeric",month:"long"}),
      year:d.getFullYear(),month:d.getMonth()
    });
  }

  const monthData=months.map(m=>{
    const recs=RECS.filter(r=>{
      const d=new Date(r.createdAt);
      return d.getFullYear()===m.year&&d.getMonth()===m.month;
    });
    const approved=recs.filter(r=>r.status==="approved").length;
    const avgU=recs.length?Math.round(recs.reduce((s,r)=>s+r.uScore,0)/recs.length):0;
    const avgSup=recs.filter(r=>r.supScore!=null).length?
      Math.round(recs.filter(r=>r.supScore!=null).reduce((s,r)=>s+r.supScore,0)/recs.filter(r=>r.supScore!=null).length):0;
    return{...m,total:recs.length,approved,avgU,avgSup};
  });

  const maxTotal=Math.max(...monthData.map(m=>m.total),1);

  // أداء المشرفين هذا الشهر
  const thisMonth=monthData[monthData.length-1];
  const thisRecs=RECS.filter(r=>{
    const d=new Date(r.createdAt);
    return d.getFullYear()===thisMonth.year&&d.getMonth()===thisMonth.month;
  });
  const supPerf={};
  thisRecs.filter(r=>r.supScore!=null).forEach(r=>{
    const s=r.supName||"غير محدد";
    if(!supPerf[s])supPerf[s]={scores:[],count:0};
    supPerf[s].scores.push(r.supScore);supPerf[s].count++;
  });
  const supRows=Object.entries(supPerf).sort((a,b)=>{
    const aa=Math.round(a[1].scores.reduce((s,x)=>s+x,0)/a[1].scores.length);
    const bb=Math.round(b[1].scores.reduce((s,x)=>s+x,0)/b[1].scores.length);
    return bb-aa;
  }).map(([n,d],i)=>{
    const avg=Math.round(d.scores.reduce((s,x)=>s+x,0)/d.scores.length);
    const rank=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
    return`<tr>
      <td>${rank} <strong>${esc(n)}</strong></td>
      <td style="text-align:center">${d.count}</td>
      <td style="text-align:center">${pill(avg)}</td>
      <td><div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;border:1px solid var(--border)">
        <div style="height:100%;border-radius:4px;width:${avg}%;background:${sc(avg)}"></div>
      </div></td>
    </tr>`;
  }).join("")||`<tr><td colspan="4" class="empty" style="padding:20px">لا توجد بيانات</td></tr>`;

  document.getElementById("tacts").innerHTML=`
    <button class="btn bg btn-sm" onclick="printMonthlyReport()">🖨️ طباعة التقرير</button>
    <button class="btn bg btn-sm" onclick="exportMonthlyExcel()">📥 Excel</button>
  `;

  document.getElementById("pgcontent").innerHTML=`<div class="fade-in">
  <!-- رأس التقرير -->
  <div class="card" style="margin-bottom:14px;border-top:3px solid var(--g1)">
    <div style="padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">

        <div style="font-size:11px;color:var(--text3);margin-top:3px">آخر 6 أشهر · ${new Date().toLocaleDateString("ar-SA",{year:"numeric",month:"long"})}</div>
      </div>
      <div style="display:flex;gap:10px">
        <div style="text-align:center;padding:10px 14px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)">
          <div style="font-size:20px;font-weight:800;color:var(--g1)">${RECS.length}</div>
          <div style="font-size:10px;color:var(--text3)">إجمالي</div>
        </div>
        <div style="text-align:center;padding:10px 14px;background:var(--bg3);border-radius:9px;border:1px solid var(--border)">
          <div style="font-size:20px;font-weight:800;color:var(--g2)">${RECS.filter(r=>r.status==="approved").length}</div>
          <div style="font-size:10px;color:var(--text3)">معتمدة</div>
        </div>
      </div>

  <!-- مخطط الأشهر -->

      <thead><tr><th>الشهر</th><th style="text-align:center">إجمالي</th><th style="text-align:center">معتمدة</th><th style="text-align:center">متوسط التقييم</th><th style="text-align:center">متوسط المشرف</th><th style="text-align:center">نسبة الاعتماد</th></tr></thead>
      <tbody>
        ${monthData.map((m,i)=>`<tr style="${i===monthData.length-1?"background:rgba(27,107,58,.04);font-weight:700":""}">
          <td>${m.label} ${i===monthData.length-1?'<span style="font-size:9px;background:var(--g1);color:#fff;padding:1px 6px;border-radius:10px;margin-right:5px">الشهر الحالي</span>':""}</td>
          <td style="text-align:center;font-weight:700;color:var(--g1)">${m.total}</td>
          <td style="text-align:center">${m.approved}</td>
          <td style="text-align:center">${m.avgU?pill(m.avgU):"—"}</td>
          <td style="text-align:center">${m.avgSup?pill(m.avgSup):"—"}</td>
          <td style="text-align:center">${m.total?`<span style="font-weight:700;color:${sc(Math.round(m.approved/m.total*100))}">${Math.round(m.approved/m.total*100)}%</span>`:"—"}</td>
        </tr>`).join("")}
      </tbody>
    </table></div>
  </div>

  <!-- أداء المشرفين -->
  <div class="card">
    <div class="ch"><div class="ct2"><div class="ct2-ic" style="background:rgba(27,107,58,.1)">🏆</div>أداء المشرفين — ${thisMonth.label}</div></div>
    <div class="twrap"><table>
      <thead><tr><th>المشرف</th><th style="text-align:center">عدد الحالات</th><th style="text-align:center">متوسط النتيجة</th><th>شريط الأداء</th></tr></thead>
      <tbody>${supRows}</tbody>
    </table></div>
  </div>
  </div>`;
}

function printMonthlyReport(){
  const old=document.title;
  document.title=`تقرير الأداء الشهري — نجم — ${new Date().toLocaleDateString("ar-SA")}`;
  window.print();
  document.title=old;
}

function exportMonthlyExcel(){
  const now=new Date();
  const BOM="﻿";
  const headers=["الشهر","إجمالي الحالات","المعتمدة","متوسط نتيجة التقييم","متوسط نتيجة المشرف","نسبة الاعتماد%"];
  const rows=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const recs=RECS.filter(r=>{const rd=new Date(r.createdAt);return rd.getFullYear()===d.getFullYear()&&rd.getMonth()===d.getMonth();});
    const approved=recs.filter(r=>r.status==="approved").length;
    const avgU=recs.length?Math.round(recs.reduce((s,r)=>s+r.uScore,0)/recs.length):0;
    const avgSup=recs.filter(r=>r.supScore!=null).length?Math.round(recs.filter(r=>r.supScore!=null).reduce((s,r)=>s+r.supScore,0)/recs.filter(r=>r.supScore!=null).length):0;
    const pct=recs.length?Math.round(approved/recs.length*100):0;
    rows.push([`"${d.toLocaleDateString("ar-SA",{year:"numeric",month:"long"})}"`,recs.length,approved,avgU||"",avgSup||"",pct].join(","));
  }
  const blob=new Blob([BOM+headers.join(",")+"\n"+rows.join("\n")],{type:"text/csv;charset=utf-8"});


  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`تقرير_الأداء_الشهري_نجم_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();URL.revokeObjectURL(url);
  toast("✅ تم التصدير");
}

function toggleDarkMode(){
  const isDark=document.body.classList.toggle("dark");
  localStorage.setItem("rms_theme",isDark?"dark":"light");
  const btn=document.getElementById("theme-btn");
  if(btn)btn.textContent=isDark?"☀️ فاتح":"🌙 داكن";
}
function initTheme(){
  const saved=localStorage.getItem("rms_theme");
  if(saved==="dark"){
    document.body.classList.add("dark");
  }
}
initTheme();

function exportData(){const blob=new Blob([JSON.stringify({records:RECS,audit:ALOG,exportDate:new Date().toISOString()},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="RMS_"+new Date().toISOString().split("T")[0]+".json";a.click();}
