<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير تحديد المسؤولية | نجم لخدمات التأمين</title>
<style>
/* DIN Next LT Arabic */
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap');

:root {
  /* ═══ ألوان نجم الرسمية ═══ */
  --g1: #1B6B3A;  /* أخضر نجم الداكن */
  --g2: #228B47;  /* أخضر نجم المتوسط */
  --g3: #2EAD5A;  /* أخضر نجم الفاتح */
  --gold: #C9A84C; /* ذهبي نجم */

  /* ═══ خلفيات فاتحة ═══ */
  --bg:   #F4F7F5;
  --bg2:  #FFFFFF;
  --bg3:  #EEF3F0;
  --card: #FFFFFF;
  --card2:#F0F5F2;

  /* ═══ حدود ═══ */
  --border:  rgba(27,107,58,0.14);
  --border2: rgba(27,107,58,0.28);

  /* ═══ نصوص ═══ */
  --text:  #1A2E22;
  --text2: #4A7A5A;
  --text3: #8AAA95;

  /* ═══ ألوان الحالة ═══ */
  --red:    #DC2626;
  --amber:  #D97706;
  --blue:   #2563EB;
  --purple: #7C3AED;
  --green:  #16A34A;
  --cyan:   #0891B2;

  /* ═══ أبعاد ═══ */
  --r: 12px; --r2: 8px; --r3: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DIN Next LT Arabic', 'Cairo', 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  direction: rtl;
  color: var(--text);
  font-size: 13px;
  line-height: 1.6;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg3); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ═══ BRAND BAR ═══ */
.brand-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--g1), var(--g2), var(--gold), var(--g2), var(--g1));
  z-index: 9999;
}

/* ═══ LOGIN ═══ */
.lw {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(27,107,58,.06), transparent),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(201,168,76,.05), transparent),
    var(--bg);
  padding-top: 3px;
}
.lb {
  width: 420px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 8px 40px rgba(27,107,58,.1), 0 2px 8px rgba(0,0,0,.06);
  position: relative; overflow: hidden;
}
.lb::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--g1), var(--g2), var(--gold), var(--g2), var(--g1));
}

/* ═══ SIDEBAR ═══ */
.sb {
  position: fixed; top: 0; right: 0;
  width: 230px; height: 100vh;
  background: var(--g1);
  display: flex; flex-direction: column;
  z-index: 100; overflow-y: auto;
  box-shadow: -4px 0 20px rgba(0,0,0,.1);
}
.logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,.12);
  background: linear-gradient(135deg, var(--g1), #134d2a);
}
.logo-mark {
  width: 44px; height: 44px;
  background: rgba(255,255,255,.15);
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.logo-name { font-size: 12px; font-weight: 800; color: #fff; line-height: 1.4; }
.logo-sub  { font-size: 10px; color: rgba(255,255,255,.6); margin-top: 2px; }

.nsec {
  padding: 14px 14px 4px;
  font-size: 9px; color: rgba(255,255,255,.45);
  font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
}
.ni {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; margin: 2px 8px;
  cursor: pointer; color: rgba(255,255,255,.7);
  font-size: 12px; font-weight: 500;
  border-radius: var(--r2);
  transition: all .18s; position: relative;
}
.ni:hover { background: rgba(255,255,255,.1); color: #fff; }
.ni.active {
  background: rgba(255,255,255,.18);
  color: #fff; font-weight: 700;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.25);
}
.ni-ic {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  background: rgba(255,255,255,.1);
  flex-shrink: 0; transition: all .18s;
}
.ni.active .ni-ic { background: rgba(255,255,255,.22); }
.ni-label { flex: 1; }
.nbdg {
  background: var(--red); color: #fff;
  border-radius: 10px; font-size: 9px; font-weight: 800;
  padding: 1px 6px; min-width: 18px; text-align: center;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

.sf { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,.1); }
.uc {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: var(--r2); padding: 10px;
  display: flex; align-items: center; gap: 9px;
}
.av {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: var(--g1);
  background: #fff; flex-shrink: 0;
}

/* ═══ MAIN ═══ */
.mn { margin-right: 230px; min-height: 100vh; padding-top: 3px; }

/* ═══ TOPBAR ═══ */
.tb {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 13px 22px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 3px; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.tb-logo {
  width: 32px; height: 32px;
  background: var(--g1);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-left: 10px;
}
.tb-t { font-size: 17px; font-weight: 800; color: var(--text); }
.tb-s { font-size: 11px; color: var(--text3); margin-top: 1px; }
.ct { padding: 20px 22px; }

/* ═══ BUTTONS ═══ */
.btn {
  padding: 8px 16px; border-radius: var(--r2); border: none;
  cursor: pointer; font-size: 12px; font-weight: 700;
  font-family: inherit; display: inline-flex; align-items: center;
  gap: 7px; transition: all .18s; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
.btn:active { transform: translateY(0); }
.bp { background: var(--g1); color: #fff; box-shadow: 0 3px 10px rgba(27,107,58,.35); }
.bp:hover { background: var(--g2); }
.bs { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(22,163,74,.3); }
.bd { background: var(--red); color: #fff; box-shadow: 0 3px 10px rgba(220,38,38,.3); }
.bw { background: var(--amber); color: #fff; box-shadow: 0 3px 10px rgba(217,119,6,.3); }
.bg {
  background: var(--bg3); color: var(--text2);
  border: 1px solid var(--border2);
}
.bg:hover { background: var(--bg); color: var(--text); }
.btn-sm { padding: 5px 11px; font-size: 11px; border-radius: var(--r3); }
.btn-xs { padding: 3px 8px; font-size: 10px; border-radius: 5px; }

/* ═══ CARDS ═══ */
.card {
  background: var(--card);
  border-radius: var(--r);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  transition: box-shadow .2s;
}
.card:hover { box-shadow: 0 4px 16px rgba(27,107,58,.08); }
.ch {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
  background: linear-gradient(135deg, rgba(27,107,58,.03), transparent);
}
.ct2 {
  font-size: 13px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 9px;
}
.ct2-ic {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.cb { padding: 15px 16px; }

/* ═══ FORMS ═══ */
.fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.fl {
  font-size: 10px; color: var(--text3); font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase;
}
.fi {
  padding: 9px 12px; border-radius: var(--r2);
  border: 1.5px solid var(--border);
  background: var(--bg3); color: var(--text);
  font-size: 12px; font-family: inherit;
  outline: none; text-align: right; width: 100%;
  transition: all .18s;
}
.fi:focus {
  border-color: var(--g2);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(27,107,58,.1);
}
textarea.fi { resize: vertical; min-height: 70px; }
.fs {
  padding: 9px 12px; border-radius: var(--r2);
  border: 1.5px solid var(--border);
  background: var(--bg3); color: var(--text);
  font-size: 12px; font-family: inherit;
  outline: none; width: 100%; transition: border-color .18s;
}
.fs:focus { border-color: var(--g2); }
.fgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px; }

/* ═══ KPI ═══ */
.kgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px; margin-bottom: 18px; }
.kpi {
  background: var(--card); border-radius: var(--r);
  border: 1px solid var(--border); padding: 16px 18px;
  position: relative; overflow: hidden;
  transition: all .2s; cursor: default;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.kpi:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(27,107,58,.1); border-color: var(--kc,var(--g2)); }
.kpi::after {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--kc, var(--g2));
}
.kpi-ic {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; margin-bottom: 11px;
  background: rgba(27,107,58,.1);
  border: 1px solid rgba(27,107,58,.2);
}
.kl { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.kv { font-size: 26px; font-weight: 800; color: var(--kc, var(--g1)); line-height: 1; margin-bottom: 3px; }
.ks { font-size: 10px; color: var(--text3); }

/* ═══ TABLE ═══ */
.twrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg3); }
th {
  padding: 10px 13px; font-size: 10px; font-weight: 700;
  color: var(--text3); text-align: right;
  border-bottom: 2px solid var(--border2);
  white-space: nowrap; letter-spacing: .5px; text-transform: uppercase;
}
td {
  padding: 10px 13px; font-size: 12px; color: var(--text);
  border-bottom: 1px solid var(--border); vertical-align: middle;
}
tbody tr:hover td { background: rgba(27,107,58,.03); }
tbody tr:last-child td { border-bottom: none; }

/* ═══ STATUS BADGES ═══ */
.sbdg {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; padding: 3px 10px; border-radius: 20px;
  font-weight: 700; border: 1px solid; white-space: nowrap;
}
.s0 { color: #64748b; background: rgba(100,116,139,.1); border-color: rgba(100,116,139,.25); }
.s1 { color: #b45309; background: rgba(180,83,9,.08); border-color: rgba(180,83,9,.25); }
.s2 { color: #1d4ed8; background: rgba(29,78,216,.08); border-color: rgba(29,78,216,.25); }
.s3 { color: var(--g1); background: rgba(27,107,58,.1); border-color: rgba(27,107,58,.3); }
.s4 { color: #c2410c; background: rgba(194,65,12,.08); border-color: rgba(194,65,12,.25); }
.s5 { color: #6d28d9; background: rgba(109,40,217,.08); border-color: rgba(109,40,217,.25); }
.s6 { color: #dc2626; background: rgba(220,38,38,.08); border-color: rgba(220,38,38,.25); }
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-weight: 800; border-radius: 20px; padding: 3px 11px;
  font-size: 11px; min-width: 55px; border: 1.5px solid;
}

/* ═══ SECTIONS (EVAL) ═══ */
.sc-card { border-radius: var(--r); border: 1.5px solid var(--border); margin-bottom: 10px; transition: border-color .2s; background: var(--card); }
.sc-card.has-sel { border-color: var(--sc); }
.sc-hdr {
  padding: 10px 13px; display: flex; align-items: center;
  justify-content: space-between; background: var(--bg3);
  flex-wrap: wrap; gap: 6px; border-radius: var(--r) var(--r) 0 0;
}
.sc-hdr.has-sel { background: rgba(27,107,58,.06); }
.sc-lbl { font-size: 12px; font-weight: 700; color: var(--sc, var(--g1)); }
.sc-wtag {
  font-size: 10px; color: var(--text3);
  padding: 2px 8px; border-radius: 20px;
  background: var(--bg); border: 1px solid var(--border);
}
.sc-ctag { font-size: 10px; font-weight: 800; color: #fff; padding: 2px 7px; border-radius: 20px; background: var(--sc, var(--g1)); }
.sc-score { font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; border: 1.5px solid; }
.sc-body { padding: 10px 13px 12px; border-top: 1px solid var(--border); }
.dtrig {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-radius: var(--r2);
  border: 1.5px solid var(--border);
  background: var(--bg3); cursor: pointer; user-select: none; transition: all .18s;
}
.dtrig:hover { border-color: var(--g2); background: var(--bg); }
.dtrig.open { border-color: var(--sc, var(--g1)); background: rgba(27,107,58,.04); }
.darr { font-size: 10px; color: var(--text3); transition: transform .2s; }
.darr.open { transform: rotate(180deg); }
.dlist {
  background: var(--bg); border: 1.5px solid var(--sc, var(--g1));
  border-radius: var(--r2); margin-top: 5px; display: none;
  max-height: 240px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}
.dlist.open { display: block; }
.di {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 9px 12px; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .15s;
}
.di:last-child { border-bottom: none; }
.di:hover { background: rgba(27,107,58,.04); }
.di.sR { background: rgba(220,38,38,.06); }
.di.sO { background: rgba(217,119,6,.06); }
.di.sY { background: rgba(161,98,7,.05); }
.ck {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all .15s;
}
.ck.on { color: #fff; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 10px; font-weight: 600; border: 1px solid;
}
.cx { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0; line-height: 1; opacity: .7; }
.cx:hover { opacity: 1; }

/* ═══ SCORE ═══ */
.scir {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; border: 3px solid; flex-shrink: 0;
}
.ssum { background: var(--bg3); border-radius: var(--r); padding: 14px; border: 1px solid var(--border); margin-bottom: 13px; }
.smain { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.brow { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.bname { font-size: 9px; color: var(--text3); text-align: right; min-width: 80px; flex-shrink: 0; }
.btrack { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
.bfill { height: 100%; border-radius: 3px; transition: width .5s; }
.bval { font-size: 9px; min-width: 22px; text-align: center; font-weight: 700; }
.bw2 { font-size: 9px; min-width: 20px; color: var(--text3); }

/* ═══ PHASE CARD ═══ */
.pc { border-radius: var(--r); border: 1.5px solid var(--border); margin-bottom: 12px; background: var(--card); }
.ph { padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 700; flex-wrap: wrap; gap: 8px; border-radius: var(--r) var(--r) 0 0; }
.pb { padding: 14px; border-top: 1px solid var(--border); }

/* ═══ MODAL ═══ */
.mo { display: none; }
.mo.open { display: flex !important; }
#mdl {
  position: fixed; inset: 0;
  background: rgba(10,30,15,.55);
  z-index: 200; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
#mbox {
  background: var(--card); border-radius: 16px;
  border: 1px solid var(--border2);
  width: 90%; max-width: 660px; max-height: 88vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,.2);
  animation: mi .22s ease;
}
@keyframes mi { from{opacity:0;transform:scale(.96) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
.mh {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--card); z-index: 1;
  background: linear-gradient(135deg, rgba(27,107,58,.04), var(--card));
}
.mh-t { font-size: 14px; font-weight: 700; color: var(--text); }
.mx {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; font-size: 14px;
  padding: 5px 10px; border-radius: 6px; line-height: 1;
  transition: all .15s; font-family: inherit;
}
.mx:hover { background: rgba(220,38,38,.08); color: var(--red); border-color: rgba(220,38,38,.25); }

/* ═══ ALERTS ═══ */
.alert {
  padding: 10px 14px; border-radius: var(--r2); font-size: 11px;
  margin-bottom: 12px; display: flex; align-items: flex-start;
  gap: 8px; line-height: 1.5; border: 1px solid;
}
.ai { background: rgba(29,78,216,.06); border-color: rgba(29,78,216,.2); color: #1d4ed8; }
.aw { background: rgba(220,38,38,.06); border-color: rgba(220,38,38,.2); color: #dc2626; }
.as { background: rgba(27,107,58,.08); border-color: rgba(27,107,58,.25); color: var(--g1); }
.ao { background: rgba(217,119,6,.06); border-color: rgba(217,119,6,.2); color: #92400e; }

/* ═══ OBJ BOX ═══ */
.obj { border-radius: var(--r); padding: 14px; border: 1.5px solid rgba(109,40,217,.25); background: rgba(109,40,217,.04); margin-top: 12px; }
.ot { font-size: 11px; font-weight: 700; color: #6d28d9; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.oc { font-size: 12px; color: var(--text); line-height: 1.6; background: var(--bg3); border-radius: var(--r2); padding: 10px; border: 1px solid var(--border); }

/* ═══ TIMELINE ═══ */
.tl { display: flex; flex-direction: column; }
.tli { display: flex; gap: 12px; padding-bottom: 15px; position: relative; }
.tli:last-child { padding-bottom: 0; }
.tld { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; z-index: 1; border: 2px solid; }
.tll { position: absolute; right: 4px; top: 14px; bottom: 0; width: 2px; background: var(--border); }
.tlc { flex: 1; }
.tlt { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.tls { font-size: 10px; color: var(--text3); }

/* ═══ LOG ITEMS ═══ */
.log-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 15px; border-bottom: 1px solid var(--border); transition: background .15s;
}
.log-item:hover { background: rgba(27,107,58,.03); }
.log-item:last-child { border-bottom: none; }
.log-ic { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; border: 1px solid; }
.log-body { flex: 1; min-width: 0; }
.log-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.log-sub { font-size: 10px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-time { font-size: 10px; color: var(--text3); flex-shrink: 0; text-align: left; line-height: 1.7; }

/* ═══ USER CARD ═══ */
.u-card {
  background: var(--card); border-radius: var(--r);
  border: 1px solid var(--border); padding: 14px 16px;
  display: flex; align-items: center; gap: 13px;
  margin-bottom: 10px; transition: all .2s;
}
.u-card:hover { border-color: var(--g2); box-shadow: 0 4px 16px rgba(27,107,58,.1); }
.u-av-lg { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 800; color: #fff; flex-shrink: 0; }
.role-tag { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; border: 1px solid; }

/* ═══ PROGRESS ═══ */
.prog { height: 6px; background: var(--bg3); border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px solid var(--border); }
.prog-f { height: 100%; border-radius: 10px; transition: width .8s cubic-bezier(.4,0,.2,1); }

/* ═══ BAR CHART ═══ */
.bar-chart { display: flex; flex-direction: column; gap: 9px; }
.bc-row { display: flex; align-items: center; gap: 9px; }
.bc-label { font-size: 10px; color: var(--text2); min-width: 95px; text-align: right; flex-shrink: 0; }
.bc-track { flex: 1; height: 20px; background: var(--bg3); border-radius: 10px; overflow: hidden; position: relative; border: 1px solid var(--border); }
.bc-fill { height: 100%; border-radius: 10px; transition: width .8s cubic-bezier(.4,0,.2,1); display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; }
.bc-val { font-size: 10px; font-weight: 800; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
.bc-pct { font-size: 10px; font-weight: 700; min-width: 33px; text-align: left; }

/* ═══ VERIFY ═══ */
.vi { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-radius: var(--r2); border: 1px solid var(--border); margin-bottom: 6px; transition: border-color .15s; background: var(--card); }
.vi:hover { border-color: var(--g2); }

/* ═══ MISC ═══ */
.cpb { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 11px; padding: 2px 5px; border-radius: 4px; transition: all .15s; }
.cpb:hover { background: var(--bg3); color: var(--text); }
.dvd { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1px; margin: 13px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border2); text-transform: uppercase; }
.empty { text-align: center; padding: 44px; color: var(--text3); }
.empty-ic { font-size: 38px; margin-bottom: 11px; opacity: .4; }
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ═══ GRIDS ═══ */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g2,.g3,.g4,.kgrid{grid-template-columns:1fr}.sb{display:none}.mn{margin-right:0}}

/* ═══ PRINT STYLES ═══ */
@media print {
  .sb, .tb, .brand-bar, .no-print { display: none !important; }
  .mn { margin-right: 0 !important; }
  .ct { padding: 0 !important; }
  body { background: #fff !important; color: #000 !important; font-size: 11px !important; }
  .card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
  .ch { background: #f5f5f5 !important; }
  .print-header { display: block !important; }
  table { border-collapse: collapse !important; width: 100% !important; }
  th, td { border: 1px solid #ddd !important; padding: 6px 8px !important; }
  th { background: #f0f0f0 !important; }
  .badge-print { border: 1px solid #999 !important; padding: 2px 6px !important; border-radius: 4px !important; }
  .kgrid { grid-template-columns: repeat(4,1fr) !important; gap: 8px !important; }
  .kpi { border: 1px solid #ddd !important; }
  .kv { font-size: 18px !important; }
  @page { margin: 1.5cm; size: A4 landscape; }
}
.print-header { display: none; }

function toast(msg,c="#1B6B3A"){
  const el=document.createElement("div");
  el.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
    background:${c};color:#fff;padding:10px 20px;border-radius:12px;font-size:12px;font-weight:600;
    z-index:9999;font-family:inherit;box-shadow:0 8px 24px rgba(0,0,0,.15);
    opacity:0;transition:all .3s;white-space:nowrap`;
  el.textContent=msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{el.style.opacity="1";el.style.transform="translateX(-50%) translateY(0)";});
  setTimeout(()=>{el.style.opacity="0";el.style.transform="translateX(-50%) translateY(10px)";setTimeout(()=>el.remove(),300);},2500);
}

let _lastNotifCheck=0;

function checkNotifications(){
  if(!CU)return;
  const now=Date.now();
  if(now-_lastNotifCheck<30000)return; // كل 30 ثانية
  _lastNotifCheck=now;
  const notifs=getMyNotifications();
  const badge=document.getElementById("notif-badge");
  if(badge){
    badge.textContent=notifs.length;
    badge.style.display=notifs.length?"flex":"none";
  }
}

function getMyNotifications(){
  const notifs=[];
  if(!CU)return notifs;
  if(CU.role==="qa_officer"){
    const pending=RECS.filter(r=>r.qaId===CU.id&&r.status==="submitted");
    if(pending.length)notifs.push({type:"info",msg:`${pending.length} حالة بانتظار مراجعتك`,page:"my_cases"});
  }

    const objRecs=RECS.filter(r=>r.supId===CU.id&&r.status==="inv_obj");

// 1. XSS Protection
function esc(s){
  if(s==null)return"";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;").replace(/\//g,"&#x2F;");
}

// 2. Brute Force Protection
const MAX_ATTEMPTS=5, LOCK_TIME=15*60*1000;
function checkBruteForce(u){
  const k="bf_"+u, d=JSON.parse(localStorage.getItem(k)||'{"n":0,"t":0}');
  if(d.n>=MAX_ATTEMPTS){
    const left=LOCK_TIME-(Date.now()-d.t);
    if(left>0)return{locked:true,remaining:Math.ceil(left/60000)};
    localStorage.removeItem(k);
  }
  return{locked:false};
}
function recordFail(u){
  const k="bf_"+u, d=JSON.parse(localStorage.getItem(k)||'{"n":0,"t":0}');
  d.n++;d.t=Date.now();localStorage.setItem(k,JSON.stringify(d));
  addSecLog("محاولة دخول فاشلة",u);
  return MAX_ATTEMPTS-d.n;
}
function clearFail(u){localStorage.removeItem("bf_"+u);}

// 3. Security Log
function addSecLog(event,detail){
  const log=JSON.parse(localStorage.getItem("rms_sec_log")||"[]");
  log.unshift({t:new Date().toISOString(),event,detail,user:CU?.username||"—",ua:navigator.userAgent.slice(0,60)});
  if(log.length>300)log.pop();
  localStorage.setItem("rms_sec_log",JSON.stringify(log));
}

// 4. Session Token
let _SESSION_TOKEN=null;
function createSession(user){
  const arr=new Uint8Array(32);
  crypto.getRandomValues(arr);
  _SESSION_TOKEN=Array.from(arr,b=>b.toString(16).padStart(2,"0")).join("");
  sessionStorage.setItem("rms_tok",_SESSION_TOKEN);
  addSecLog("تسجيل دخول ناجح",user.username||user.name);
}
function destroySession(){
  _SESSION_TOKEN=null;
  sessionStorage.removeItem("rms_tok");
  if(CU)addSecLog("تسجيل خروج",CU.username||CU.name);
}

// 5. Input Validation
function validateInput(v,type){
  if(!v||!v.trim())return{ok:false,msg:"الحقل مطلوب"};
  if(type==="password"&&v.length<6)return{ok:false,msg:"كلمة المرور: 6 أحرف على الأقل"};
  if(type==="name"&&(v.length<2||v.length>50))return{ok:false,msg:"الاسم: 2-50 حرف"};
  return{ok:true};
}

const SESSION_KEY = "rms_session";
const SESSION_TIMEOUT = 15 * 60 * 1000; // 15 دقيقة
let sessionTimer = null;

function saveSession() {
  const session = {
    user: CU,
    recs: RECS,
    alog: ALOG,
    rr: RR,
    expiry: Date.now() + SESSION_TIMEOUT,
  };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const session = JSON.parse(raw);
    if (!session.expiry || Date.now() > session.expiry) {
      localStorage.removeItem(SESSION_KEY);
      return false;
    }
    // استعادة البيانات
    CU = session.user;
    RECS = session.recs || [];
    ALOG = session.alog || [];
    RR = session.rr || 0;
    return true;
  } catch(e) {
    return false;
  }
}

function resetSessionTimer() {
  if (sessionTimer) clearTimeout(sessionTimer);
  sessionTimer = setTimeout(() => {
    // انتهت الجلسة
    saveSession(); // حفظ أخير
    showSessionExpired();
  }, SESSION_TIMEOUT);
  // تحديث وقت انتهاء الجلسة
  const raw = localStorage.getItem(SESSION_KEY);
  if (raw) {
    try {
      const s = JSON.parse(raw);
      s.expiry = Date.now() + SESSION_TIMEOUT;
      localStorage.setItem(SESSION_KEY, JSON.stringify(s));
    } catch(e) {}
  }
}

const API_URL = "https://script.google.com/macros/s/AKfycbyLIIzhtM4kbEwV6p3ak3n3dZ8TjtPOA4Mb-qS4a0eUJO4a9ixkzeq8RFgKQRlqyg/exec";
const API_KEY = "Najm-RMS-2026-7f3a9c2e"; // يجب أن يطابق API_KEY في Code.gs تماماً
let API_READY = false;

function apiCall(action, data={}) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const params = new URLSearchParams({action, key: API_KEY, callback: cbName, ...flattenData(data)});
    window[cbName] = function(json) {
      delete window[cbName];
      document.getElementById(cbName+"_script")?.remove();
      if(json.error) reject(new Error(json.error));
      else resolve(json);
    };
    const script = document.createElement("script");
    script.id = cbName + "_script";
    script.src = API_URL + "?" + params.toString();
    script.onerror = () => { delete window[cbName]; reject(new Error("Network error")); };
    document.head.appendChild(script);
    setTimeout(() => { delete window[cbName]; document.getElementById(cbName+"_script")?.remove(); reject(new Error("Timeout")); }, 15000);
  });
}

function flattenData(data) {
  const result = {};
  Object.keys(data).forEach(k => {
    if(typeof data[k] === "object") result[k] = JSON.stringify(data[k]);
    else result[k] = data[k];
  });
  return result;
}

async function loadFromSheets() {
  showLoading("جاري تحميل البيانات...");
  try {
    // تحميل المستخدمين
    const usersRes = await apiCall("getUsers");
    if(usersRes.users) {
      localStorage.setItem("rms_users", JSON.stringify(usersRes.users));
    }
    // تحميل التقييمات
    const recsRes = await apiCall("getRecords");
    if(recsRes.records) {
      RECS = recsRes.records;
    }
    // تحميل الـ RR
    const rrRes = await apiCall("getRR");
    if(rrRes.value !== undefined) {
      RR = rrRes.value;
    }
    API_READY = true;
    hideLoading();
  } catch(err) {
    hideLoading();
    showError("تعذر الاتصال بالخادم — يعمل بالوضع المحلي");
    API_READY = false;
  }
}

async function saveToSheets_record(rec) {
  if(!API_READY) return;
  try { await apiCall("saveRecord", {record: rec}); } catch(e) {}
}

async function updateToSheets_record(rec) {
  if(!API_READY) return;
  try {
    const expectedVersion = rec._version || 1;
    const res = await apiCall("updateRecord", {record: rec, expectedVersion});
    if(res && res.conflict) {
      // تعارض: شخص آخر عدّل السجل في نفس الوقت — ننبّه المستخدم بدل أن نمحو تعديله بصمت
      showError("⚠️ "+res.error);
      return false;
    }
    if(res && res.newVersion) rec._version = res.newVersion;
    return true;
  } catch(e) { return false; }
}

async function saveToSheets_users(users) {
  if(!API_READY) return;
  try { await apiCall("saveUsers", {users}); } catch(e) {}
}

async function saveToSheets_rr(val) {
  if(!API_READY) return;
  try { await apiCall("setRR", {value: val}); } catch(e) {}
}

async function addToSheets_log(entry) {

// ═══ SCORE ENGINE ═══
function secScore(sec,items,isCall){if(!items||!items.length)return sec.weight;if(isCall)return Math.max(0,sec.weight-items.reduce((s,i)=>s+i.deduction,0));if(items.some(i=>i.impact==="R"))return 0;let d=0;items.forEach(i=>{if(i.impact==="O")d+=Math.ceil(sec.weight/2);else if(i.impact==="Y")d+=1;});return Math.max(0,sec.weight-d);}
function totScore(secs,eMap,isCall){if(!secs)return 100;return Math.round(secs.reduce((t,s)=>t+secScore(s,eMap[s.id]||[],isCall),0));}
function callScore(secs,eMap,crits){if(crits&&crits.length)return 0;return totScore(secs,eMap,true);}

// ═══ SECTION BUILDER ═══
function buildSecs(secs,eMap,oMap,prefix,isCall){
  if(!secs||!secs.length)return"";
  return secs.map(sec=>{
    const sel=eMap[sec.id]||[];
    const isOpen=!!oMap[prefix+"_"+sec.id];
    const ss=secScore(sec,sel,isCall);
    const pct=Math.round(ss/sec.weight*100);
    const sc2=pct>=100?"var(--g1)":pct===0?"var(--red)":"var(--amber)";
    const col=sec.color||"var(--g1)";

    // Chips — العناصر المختارة
    const chipsH=sel.map(item=>`
      <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;
        font-size:10px;font-weight:600;color:#fff;background:${col};border:1px solid ${col};margin:2px">
        <button onclick="event.stopPropagation();rmE('${prefix}',${sec.id},'${item.text.replace(/'/g,"\'")}',${isCall})"
          style="background:none;border:none;cursor:pointer;color:#fff;font-size:13px;padding:0;line-height:1;opacity:.8">×</button>
        <span>${isCall?"-"+item.deduction+" | ":""}${esc(item.text)}</span>
      </span>`).join("");

    // قائمة العناصر
    const itemsH=sec.items.map((item,idx2)=>{
      const isSel=sel.some(s=>s.text===item.text);
      const ik=item.impact||"O";
      const ic=isCall?col:({R:"var(--red)",O:"var(--amber)",Y:"#a16207"}[ik]||"var(--text2)");
      const impE={R:"🔴",O:"🟠",Y:"🟡"};
      const ded=isCall
        ?`<span style="font-size:9px;font-weight:800;color:${ic};background:${ic}18;padding:1px 6px;border-radius:4px;flex-shrink:0">-${item.deduction}</span>`
        :(ik==="R"?`<span style="font-size:9px;font-weight:800;color:var(--red);background:rgba(220,38,38,.08);padding:1px 6px;border-radius:4px;flex-shrink:0">القسم كاملاً</span>`
        :ik==="O"?`<span style="font-size:9px;font-weight:700;color:var(--amber);background:rgba(217,119,6,.08);padding:1px 6px;border-radius:4px;flex-shrink:0">½ القسم</span>`
        :`<span style="font-size:9px;font-weight:600;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:4px;flex-shrink:0">-1 درجة</span>`);

      return`<div onclick="event.stopPropagation();togE('${prefix}',${sec.id},${idx2},${isCall})"
        style="display:flex;align-items:flex-start;gap:9px;padding:9px 13px;cursor:pointer;
          border-bottom:1px solid var(--border);transition:background .15s;
          ${isSel?`background:${ic}08`:""}"
        onmouseover="this.style.background='${ic}06'" onmouseout="this.style.background='${isSel?ic+"08":"transparent"}'">
        <div style="width:16px;height:16px;border-radius:4px;border:1.5px solid ${isSel?ic:"var(--border2)"};
          flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
          font-size:10px;background:${isSel?ic:"transparent"};color:#fff;transition:all .15s">
          ${isSel?"✓":""}
        </div>
        <div style="font-size:11px;line-height:1.5;flex:1;color:${isSel?ic:"var(--text2)"}">
          ${isCall?"":impE[ik]+" "}<span style="${isSel?"font-weight:600":""}">${esc(item.text)}</span>
        </div>
        ${ded}
      </div>`;
    }).join("");

    return`
    <div style="border-radius:var(--r);border:1.5px solid ${sel.length?col:"var(--border)"};
      overflow:visible;margin-bottom:10px;background:var(--card);transition:border-color .2s">
      <!-- Header -->
      <div style="padding:10px 13px;display:flex;align-items:center;justify-content:space-between;
        background:${sel.length?col+"12":"var(--bg3)"};flex-wrap:wrap;gap:6px;
        border-radius:var(--r) var(--r) 0 0">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
          <span style="font-size:12px;font-weight:700;color:${col}">${sec.label}</span>
          <span style="font-size:10px;color:var(--text3);padding:2px 8px;border-radius:20px;
            background:var(--bg);border:1px solid var(--border)">وزن ${sec.weight}%</span>
          ${sel.length?`<span style="font-size:10px;font-weight:800;color:#fff;padding:1px 7px;
            border-radius:20px;background:${col}">${sel.length}</span>`:""}
        </div>
        <span style="font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;
          border:1.5px solid ${sc2};color:${sc2};background:${sc2}14">${ss}/${sec.weight}</span>
      </div>

      <!-- Body -->
      <div style="padding:10px 13px 12px;border-top:1px solid var(--border)">
        <!-- Trigger -->
        <div onclick="togD('${prefix}',${sec.id})"
          style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
            border-radius:var(--r2);border:1.5px solid ${isOpen?col:"var(--border)"};
            background:${isOpen?col+"08":"var(--bg3)"};cursor:pointer;user-select:none;transition:all .18s">
          <span style="font-size:12px;font-weight:${sel.length?"600":"400"};color:${sel.length?col:"var(--text3)"}">
            ${sel.length?sel.length+" ملاحظة مختارة ✓":"اختر الملاحظات ▾"}
          </span>
          <span style="font-size:10px;color:var(--text3);transition:transform .2s;
            display:inline-block;transform:rotate(${isOpen?180:0}deg)">▼</span>
        </div>

        <!-- Dropdown -->
        <div style="background:#fff;border:1.5px solid ${col};border-radius:var(--r2);
          margin-top:6px;${isOpen?"display:block":"display:none"};
          max-height:250px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.1)">
          ${itemsH}
        </div>

        <!-- Chips -->
        ${sel.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:9px">${chipsH}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

function getMap(prefix){
  const cr=CR[prefix==="qu"?(QS.type||"RMS1"):ES.type]||CR.RMS1;
  const M={
    m:{secs:cr.madkhal,eMap:ES.mE,oMap:ES.mO,isCall:false},
    u:{secs:cr.muatamad,eMap:ES.uE,oMap:ES.uO,isCall:false},
    c:{secs:cr.call||cr.video,eMap:ES.cE,oMap:ES.cO,isCall:true},
    mc:{secs:cr.muatamadCall||cr.madkhalCall,eMap:ES.mcE,oMap:ES.mcO,isCall:true},
    qu:{secs:(CR[QS.type]||CR.RMS1).muatamad,eMap:QS.undE,oMap:QS.undO,isCall:false},
  };
  return M[prefix]||{secs:[],eMap:{},oMap:{},isCall:false};
}
function togD(prefix,secId){
  const{oMap,secs,eMap,isCall}=getMap(prefix);
  const key=prefix+"_"+secId;
  Object.keys(oMap).forEach(k=>{if(k!==key)oMap[k]=false;});
  oMap[key]=!oMap[key];
  const el=document.getElementById(prefix+"-secs");
  if(el)el.innerHTML=buildSecs(secs,eMap,oMap,prefix,isCall);
  updScores();
}
function togE(prefix,secId,idx,isCall){
  const{secs,eMap,oMap}=getMap(prefix);
  const sec=(secs||[]).find(s=>s.id===secId);if(!sec)return;
  const item=sec.items[idx];
  if(prefix==="qu"){const r=RECS.find(x=>x.id===QS.recId);if(r&&(r.uE[secId]||[]).some(e=>e.text===item.text)){toast("هذه الملاحظة مرصودة — راجعها في قسم التحقق","#ca8a04");return;}}
  if(!eMap[secId])eMap[secId]=[];
  const pos=eMap[secId].findIndex(e=>e.text===item.text);
  if(pos>=0)eMap[secId].splice(pos,1);else eMap[secId].push(item);
  const el=document.getElementById(prefix+"-secs");
  if(el)el.innerHTML=buildSecs(secs,eMap,oMap,prefix,isCall);
  if(prefix==="qu"){const r=RECS.find(x=>x.id===QS.recId);if(r)renderQAPage(r);}
  else updScores();
}
function rmE(prefix,secId,text,isCall){
  const{secs,eMap,oMap}=getMap(prefix);
  if(eMap[secId])eMap[secId]=eMap[secId].filter(e=>e.text!==text);
  const el=document.getElementById(prefix+"-secs");
  if(el)el.innerHTML=buildSecs(secs,eMap,oMap,prefix,isCall);
  if(prefix==="qu"){const r=RECS.find(x=>x.id===QS.recId);if(r)renderQAPage(r);}
  else updScores();
}
function togCrit(prefix,text){
  const arr=prefix==="c"?ES.cCrit:ES.mcCrit;
  const idx=arr.indexOf(text);if(idx>=0)arr.splice(idx,1);else arr.push(text);
  const cr=CR[ES.type]||CR.RMS1;
  const list=prefix==="c"?(cr.callCritical||cr.videoCritical||[]):(cr.callCritical||[]);
  const el=document.getElementById(prefix+"-crits");
  if(el)el.innerHTML=buildCritList(prefix,list,arr);
  updScores();
}
function buildCritList(prefix,list,sel){
  return list.map(text=>{const s=sel.includes(text);return`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);${s?"background:rgba(192,0,0,0.1)":""}" onclick="togCrit('${prefix}','${text.replace(/'/g,"\'")}')">
    <div style="width:14px;height:14px;border-radius:3px;border:1.5px solid ${s?"#c00000":"rgba(255,255,255,0.2)"};flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;background:${s?"#c00000":"transparent"};color:#fff">${s?"✓":""}</div>
    <div style="font-size:11px;flex:1;color:${s?"#c00000":"#94a3b8"}">🔴 ${text}</div>
    <span style="font-size:9px;font-weight:700;color:#c00000">تصفير</span>
  </div>`;}).join("");
}
function secBarsH(secs,eMap,isCall){
  if(!secs)return"";
  return secs.map(s=>{const items=eMap[s.id]||[];const ss=secScore(s,items,isCall);const pct=Math.round(ss/s.weight*100);const bc=pct>=100?(s.color||"var(--g1)"):pct===0?"var(--red)":"var(--amber)";
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="font-size:9px;color:var(--text3);text-align:right;min-width:85px">${s.label}</div><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${pct}%;background:${bc};transition:width .4s"></div></div><div style="font-size:9px;min-width:24px;text-align:center;font-weight:700;color:${bc}">${ss}</div><div style="font-size:9px;min-width:20px;color:var(--text3)">/${s.weight}</div></div>`;
  }).join("");
}
function updScores(){
  const cr=CR[ES.type]||CR.RMS1;
  [{p:"m",secs:cr.madkhal,eMap:ES.mE,isCall:false,crits:null},{p:"u",secs:cr.muatamad,eMap:ES.uE,isCall:false,crits:null},{p:"c",secs:cr.call||cr.video,eMap:ES.cE,isCall:true,crits:ES.cCrit},{p:"mc",secs:cr.muatamadCall||cr.madkhalCall,eMap:ES.mcE,isCall:true,crits:ES.mcCrit}].forEach(({p,secs,eMap,isCall,crits})=>{
    if(!secs)return;
    const s=isCall?callScore(secs,eMap,crits||[]):totScore(secs,eMap,false);
    const el=document.getElementById(p+"-cir");if(el){el.textContent=s+"%";el.style.color=sc(s);el.style.borderColor=sc(s);el.style.background=sb(s);}
    const b=document.getElementById(p+"-bars");if(b)b.innerHTML=secBarsH(secs,eMap,isCall);
  });
  const allErr=[...Object.values(ES.mE),...Object.values(ES.uE)].flat();
  const hasCrit=allErr.some(e=>e.impact==="R");const hasOr=allErr.some(e=>e.impact==="O");
  const corrEl=document.getElementById("ev-corr");
  if(corrEl&&!corrEl.dataset.mod)corrEl.value=hasCrit?AUTO_CORR.R:hasOr?AUTO_CORR.O:allErr.length?AUTO_CORR.Y:"";
}

function renderEvalForm(){

        <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">

          <div style="display:flex;align-items:center;gap:14px">
            <div id="m-cir" style="width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;border:3px solid ${sc(mScore)};color:${sc(mScore)};background:${sb(mScore)};flex-shrink:0">${mScore}%</div>
            <div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:5px">نتيجة المدخل</div><div id="m-bars">${secBarsH(cr.madkhal,ES.mE,false)}</div></div>
          </div>
        </div>
        ${cr.hasCall&&!cr.hasMuatamadCall?callPhase("c",cr.call,ES.cE,ES.cO,ES.cCrit,cr.callCritical,"📞 مكالمة المدخل","c",cScore,invOpts,ES.mInvId,"c-inv"):""}
      </div>
    </div>`;
  }

  const ulabel=ES.type==="FIELD"?"📋 التصنيف الأساسي — التقرير الميداني":"✅ التصنيف الأساسي — المعتمد";
  const muatamadCard=`<div style="border-radius:10px;border:1.5px solid rgba(124,58,237,0.3);overflow:visible;margin-bottom:11px">
    <div style="padding:10px 13px;display:flex;align-items:center;justify-content:space-between;background:rgba(124,58,237,0.06);font-size:12px;font-weight:700;color:#a78bfa;flex-wrap:wrap;gap:7px">
      <div>${ulabel}</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
        <select class="fs" id="u-inv" style="width:160px;font-size:11px" onchange="syncInvName('u-inv','un')">${invOpts(ES.uInvId)}</select>
        <input class="fi" id="ue" placeholder="الرقم الوظيفي" style="width:110px;font-size:11px">
        <input class="fi" id="usp" placeholder="المشرف المسؤول" style="width:120px;font-size:11px" value="${CU.name}">
      </div>
    </div>
    <div style="padding:13px;border-top:1px solid var(--border)">
      <div id="u-secs">${buildSecs(cr.muatamad,ES.uE,ES.uO,"u",false)}</div>
      <div style="background:rgba(27,107,58,0.04);border-radius:9px;padding:13px;border:1px solid var(--border);margin-top:11px">
        <div style="display:flex;align-items:center;gap:14px">
          <div id="u-cir" style="width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;border:3px solid ${sc(uScore)};color:${sc(uScore)};background:${sb(uScore)};flex-shrink:0">${uScore}%</div>
          <div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:5px">نتيجة ${ES.type==="FIELD"?"التقرير":"المعتمد"}</div><div id="u-bars">${secBarsH(cr.muatamad,ES.uE,false)}</div></div>
        </div>
      </div>
      ${cr.hasVideo?callPhase("c",cr.video,ES.cE,ES.cO,ES.cCrit,cr.videoCritical,"🎥 الفيديو","cv",cScore,invOpts,ES.uInvId,"cv-inv"):""}
      ${cr.hasMuatamadCall?callPhase("mc",cr.muatamadCall||cr.madkhalCall,ES.mcE,ES.mcO,ES.mcCrit,cr.callCritical,"📞 مكالمة المعتمد (اختياري)","mc",mcScore,invOpts,ES.uInvId,"mc-inv"):""}
    </div>
  </div>`;

  document.getElementById("pgcontent").innerHTML=`
  <div class="card"><div class="ch"><div class="ct2">📋 بيانات الحالة</div></div><div class="cb">
    <div style="margin-bottom:14px"><div class="fl" style="margin-bottom:8px">نوع الحالة</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">${typeCards}</div></div>
    <div class="fgrid">
      <div class="fg"><div class="fl">رقم الحالة</div><input class="fi" id="ev-rno" placeholder="رقم الحالة"></div>

      <div class="fg"><div class="fl">اسم المشرف</div><input class="fi" id="ev-sup" value="${CU.name}" readonly style="opacity:.7"></div>
      <div class="fg"><div class="fl">تاريخ التقييم</div><input class="fi" type="date" id="ev-ed" value="${new Date().toISOString().split("T")[0]}"></div>
    </div>
  </div></div>
  ${madkhalCard}${muatamadCard}
  <div class="card" style="border-color:rgba(220,38,38,0.3)">
    <div class="ch" style="background:rgba(220,38,38,0.06)"><div class="ct2" style="color:#fca5a5">🔴 الأكشن على الملاحظات الجوهرية</div></div>
    <div class="cb">
      <div class="fg"><div class="fl">الأكشن المتخذ</div><textarea class="fi" id="ev-action" rows="3" placeholder="اكتب الأكشن المتخذ على الملاحظات الجوهرية..."></textarea></div>
      <div class="fg"><div class="fl">المستندات الداعمة</div>

          <div style="font-size:11px;color:var(--text2)">اسحب الملفات أو اضغط للرفع (حد أقصى 5 ملفات)</div>
          <input type="file" id="ev-att" multiple accept="image/*,.pdf,.doc,.docx" style="display:none" onchange="handleF(this.files)">
        </div>
        <div id="flist" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:7px"></div>
      </div>
    </div>
  </div>
  <div class="card"><div class="cb">
    <div class="fgrid" style="margin-bottom:11px">
      <div class="fg"><div class="fl">الإجراء التصحيحي (يُملأ تلقائياً)</div><textarea class="fi" id="ev-corr" rows="2" placeholder="الإجراء التصحيحي..." oninput="this.dataset.mod=1"></textarea></div>
      <div><div class="fg"><div class="fl">السبب الجذري</div><select class="fs" id="ev-root"><option value="">اختر</option><option>نقص معرفة</option><option>عدم الالتزام بالإجراء</option><option>سهو</option><option>مشكلة تقنية</option></select></div>
      <div class="fg"><div class="fl">الإجراء المتخذ</div><select class="fs" id="ev-act"><option value="">اختر</option><option>تنبيه</option><option>توجيه</option><option>تدريب</option><option>إعادة تقييم</option></select></div></div>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn bg" onclick="saveEval('draft')">💾 حفظ مسودة</button>
      <button class="btn bp" onclick="saveEval('submitted')" style="font-size:13px;padding:9px 22px">📤 إرسال للجودة</button>
    </div>
  </div></div>`;
}

function syncInvName(selId,nameId){
  const sel=document.getElementById(selId);
  const inv=getUserById(sel.value);
  // حفظ في ES حسب نوع الحقل
  if(selId==="m-inv")ES.mInvId=sel.value;
  if(selId==="u-inv")ES.uInvId=sel.value;
  if(selId==="c-inv"||selId==="cv-inv"||selId==="mc-inv")ES.callInvId=ES.callInvId||{};
  if(selId==="c-inv"||selId==="cv-inv")ES.callInvId.call=sel.value;
  if(selId==="mc-inv")ES.callInvId.mc=sel.value;
}

function callPhase(prefix,secs,eMap,oMap,crits,critList,label,nameId,score,invOpts,defInvId,invSelId){
  if(!secs)return"";
  const invSelector=invOpts?`<select class="fs" id="${invSelId}" style="width:160px;font-size:11px" onchange="syncInvName('${invSelId}','${nameId}-n')">${invOpts(defInvId)}</select>`
    :`<input class="fi" id="${nameId}-n" placeholder="اسم الموظف" style="width:130px;font-size:11px">`;
  return`<div style="border-radius:9px;border:1.5px solid rgba(91,33,182,0.3);overflow:visible;margin-top:11px">
    <div style="padding:10px 13px;display:flex;align-items:center;justify-content:space-between;background:rgba(91,33,182,0.06);font-size:12px;font-weight:700;color:#c4b5fd;flex-wrap:wrap;gap:7px">
      <div>${label}</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
        ${invSelector}
        <input class="fi" id="${nameId}-e" placeholder="الرقم الوظيفي" style="width:110px;font-size:11px">
      </div>
    </div>
    <div style="padding:13px;border-top:1px solid var(--border)">
      <div id="${prefix}-secs">${buildSecs(secs,eMap,oMap,prefix,true)}</div>
      <div class="card" style="border-color:rgba(220,38,38,0.3);margin-top:9px">
        <div class="ch" style="background:rgba(220,38,38,0.06)"><div class="ct2" style="color:#dc2626;font-size:11px">🔴 الأخطاء الجسيمة</div></div>
        <div class="cb">${crits.length?`<div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:7px;padding:8px;margin-bottom:9px;font-size:11px;color:#fca5a5">⚠️ يوجد خطأ جسيم — النتيجة صفر</div>`:""}
          <div id="${prefix}-crits">${buildCritList(prefix,critList||[],crits)}</div>
        </div>
      </div>
      <div style="background:rgba(27,107,58,0.04);border-radius:9px;padding:13px;border:1px solid var(--border);margin-top:11px">
        <div style="display:flex;align-items:center;gap:14px">
          <div id="${prefix}-cir" style="width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;border:3px solid ${sc(score||0)};color:${sc(score||0)};background:${sb(score||0)};flex-shrink:0">${score!=null?score:0}%</div>
          <div style="flex:1"><div style="font-size:11px;color:var(--text3);margin-bottom:5px">نتيجة ${label}</div><div id="${prefix}-bars">${secBarsH(secs,eMap,true)}</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

function handleF(files){Array.from(files).forEach(file=>{if(ES.files.length>=5){toast("الحد الأقصى 5 ملفات","#dc2626");return;}if(ES.files.some(f=>f.name===file.name))return;const r=new FileReader();r.onload=e=>{ES.files.push({name:file.name,size:file.size,type:file.type,data:e.target.result});renderFList();};r.readAsDataURL(file);});}
function renderFList(){const el=document.getElementById("flist");if(!el)return;el.innerHTML=ES.files.map((f,i)=>{const isImg=f.type.startsWith("image/");const sz=f.size>1048576?(f.size/1048576).toFixed(1)+"MB":(f.size/1024).toFixed(0)+"KB";return`<div style="display:flex;align-items:center;gap:7px;padding:6px 9px;background:rgba(27,107,58,0.06);border-radius:7px;border:1px solid var(--border)">${isImg?`<img src="${f.data}" style="width:28px;height:28px;object-fit:cover;border-radius:3px">`:"<span style='font-size:16px'>📄</span>"}<div style="flex:1;min-width:0"><div style="font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div><div style="font-size:10px;color:var(--text3)">${sz}</div></div><button onclick="ES.files.splice(${i},1);renderFList()" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px">×</button></div>`;}).join("");}

function saveEval(status){
  const rno=gv("ev-rno");if(!rno){toast("الرجاء إدخال رقم الحالة","#dc2626");return;}
  const cr=CR[ES.type]||CR.RMS1;
  const ms=cr.hasMadkhal?totScore(cr.madkhal,ES.mE,false):null;
  const us=totScore(cr.muatamad,ES.uE,false);
  const cSecs=cr.call||cr.video;const cs=cSecs?callScore(cSecs,ES.cE,ES.cCrit):null;
  const mcSecs=cr.muatamadCall||cr.madkhalCall;const mcs=mcSecs?callScore(mcSecs,ES.mcE,ES.mcCrit):null;
  const qa=status==="submitted"?assignQA():{id:null,name:null};

  // ربط المحققين بالمعرّف الفعلي (ID) بدل النص الحر
  const mInvId=gv("m-inv")||"";
  const uInvId=gv("u-inv")||"";
  const cInvId=gv("c-inv")||gv("cv-inv")||"";
  const mcInvId=gv("mc-inv")||"";
  const mInv=mInvId?getUserById(mInvId):null;
  const uInv=uInvId?getUserById(uInvId):null;
  const cInv=cInvId?getUserById(cInvId):null;
  const mcInv=mcInvId?getUserById(mcInvId):null;

  const rec={
    id:Date.now(),createdAt:new Date().toISOString(),type:ES.type,rno,
    rdate:gv("ev-rd"),supId:CU.id,supName:CU.name,edate:gv("ev-ed"),
    status,qaId:qa.id,qaName:qa.name,
    // المدخل — مربوط بمعرّف ثابت + اسم ظاهر للتوافق مع النسخ القديمة
    madkhalInvId:mInvId,madkhalName:mInv?mInv.name:"",madkhalEid:gv("me")||"",madkhalSup:gv("ms")||"",
    mE:JSON.parse(JSON.stringify(ES.mE)),mScore:ms,
    // المعتمد/التقرير الميداني — مربوط بمعرّف ثابت
    muatamadInvId:uInvId,muatamadName:uInv?uInv.name:"",muatamadEid:gv("ue")||"",muatamadSup:gv("usp")||"",
    uE:JSON.parse(JSON.stringify(ES.uE)),uScore:us,
    // مكالمة المدخل أو الفيديو
    callInvId:cInvId,callName:cInv?cInv.name:"",callEid:gv("c-e")||gv("cv-e")||"",
    cE:JSON.parse(JSON.stringify(ES.cE)),cCrit:[...ES.cCrit],cScore:cs,
    // مكالمة المعتمد (RMS2 فقط)
    mcInvId:mcInvId,mcName:mcInv?mcInv.name:"",mcEid:gv("mc-e")||"",
    mcE:JSON.parse(JSON.stringify(ES.mcE)),mcCrit:[...ES.mcCrit],mcScore:mcs,
    action:gv("ev-action"),files:ES.files.map(f=>({name:f.name,size:f.size,type:f.type,data:f.data})),
    corrective:gv("ev-corr"),rootCause:gv("ev-root"),actionTaken:gv("ev-act"),
    supScore:null,matchRate:null,undetCount:null,wrongCount:null,
    qaVerify:{},qaUndE:{},qaOfficer:null,qaDate:null,qaNotes:null,qaCritAction:null,
    invObj:null,supObj:null,objDecision:null,
    trail:[{t:new Date().toISOString(),user:CU.name,action:status==="submitted"?"إرسال للجودة":"حفظ مسودة",note:""}],
  };
  RECS.push(rec);save();saveToSheets_record(rec);
  addLog(status==="submitted"?"إرسال تقييم":"حفظ مسودة",`${ES.type} — رقم ${rno}${qa.name?" — مُسند لـ "+qa.name:""}`,rec.id);
  toast(status==="submitted"?`✅ تم الإرسال — مُسند لـ ${qa.name||"—"}`:"💾 تم حفظ المسودة");
  goTo("my_evals");
}

  document.getElementById("tacts").innerHTML=`<button class="btn bp" onclick="goTo('new_eval')" style="font-size:11px">＋ تقييم جديد</button>`;
  const my=RECS.filter(r=>r.supId===CU.id).sort((a,b)=>b.id-a.id);
  const rows=my.map(r=>{
    const cr=CR[r.type]||CR.RMS1;
    const callTip=r.callName?`title="${cr.hasVideo?"الفيديو":(r.type==="RMS2"?"مكالمة المدخل":"المكالمة")}: ${esc(r.callName)}"`:"";
    const mcTip=r.mcName?`title="مكالمة المعتمد: ${esc(r.mcName)}"`:"";
    return`<tr><td><strong style="color:var(--g1)">${esc(r.rno)}</strong><button class="cpb" onclick="cpT('${r.rno}')">📋</button></td><td>${tbdg(r.type)}</td><td>${esc(r.muatamadName||"—")}</td><td>${pill(r.mScore)}</td><td>${pill(r.uScore)}</td><td ${callTip}>${pill(r.cScore)}</td><td ${mcTip}>${pill(r.mcScore)}</td><td>${pill(r.supScore)}</td><td>${sbdg(r.status)}</td><td style="white-space:nowrap">

    ${(r.status==="qa_review"||r.status==="approved")&&!r.supObj?`<button onclick="openSupObj(${r.id})" style="padding:2px 7px;border-radius:5px;border:1.5px solid #7c3aed;color:#a78bfa;background:transparent;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit">اعتراض</button>`:""}
    ${r.status==="inv_obj"?`<button class="btn bw btn-xs" onclick="openReplyInv(${r.id})">رد على الاعتراض</button>`:""}
  </td></tr>`;}).join("")||`<tr><td colspan="10" style="text-align:center;padding:36px;color:var(--text3)">لا توجد تقييمات</td></tr>`;
  document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">📋 تقييماتي (${my.length})</div></div><div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>المعتمد</th><th>المدخل%</th><th>نتيجة التقييم</th><th>📞 مكالمة 1</th><th>📞 مكالمة المعتمد</th><th>نتيجة المشرف</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function pgSupObj(){
  const recs=RECS.filter(r=>r.supId===CU.id&&r.status==="inv_obj").sort((a,b)=>b.id-a.id);
  const rows=recs.map(r=>`<tr><td><strong style="color:var(--g1)">${esc(r.rno)}</strong></td><td>${tbdg(r.type)}</td><td>${esc(r.muatamadName||"—")}</td><td>${pill(r.uScore)}</td><td><div style="font-size:11px;color:#a78bfa;max-width:180px">${r.invObj?.reason||"—"}</div></td><td><button class="btn bp btn-sm" onclick="openReplyInv(${r.id})">الرد على الاعتراض</button></td></tr>`).join("")||`<tr><td colspan="6" style="text-align:center;padding:36px;color:var(--text3)">لا توجد اعتراضات ✅</td></tr>`;
  document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">⚠️ اعتراضات المحققين (${recs.length})</div></div><div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>المحقق</th><th>النتيجة</th><th>سبب الاعتراض</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;

function startQA(id){const r=RECS.find(x=>x.id===id);if(!r)return;r.status="qa_review";if(!r.trail.some(a=>a.action==="بدء مراجعة الجودة"))r.trail.push({t:new Date().toISOString(),user:CU.name,action:"بدء مراجعة الجودة",note:""});save();QS={recId:id,type:r.type,verify:{...r.qaVerify||{}},undE:{...r.qaUndE||{}},undO:{}};QCA=r.qaCritAction||null;renderQAPage(r);}

    ${r.cScore!=null?`<div style="text-align:center;padding:9px 14px;background:rgba(27,107,58,0.04);border-radius:7px;border:1px solid var(--border)"><div style="font-size:16px;font-weight:800;color:${sc(r.cScore)}">${r.cScore}%</div><div style="font-size:10px;color:var(--text3)">${cr.hasVideo?"🎥":"📞"} ${callLbl2}</div></div>`:""}

  </div>
  <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border)">التحقق من ملاحظات المعتمد</div>`;
  if(uFlat.length){uFlat.forEach(e=>{const v=QS.verify[e.text];sumH+=`<div style="display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:7px;border:1px solid var(--border);margin-bottom:5px"><span style="font-size:13px">${IMP[e.impact].e}</span><div style="flex:1;font-size:11px;line-height:1.5;color:${v==="no"?"#475569":IMP[e.impact].c};${v==="no"?"text-decoration:line-through":""}">${e.text}<div style="font-size:10px;opacity:.7">${e.sec.label}</div></div><div style="display:flex;gap:5px"><button onclick="QS.verify['${e.text.replace(/'/g,"\'")}']='ok';renderQAPage(RECS.find(x=>x.id===${r.id}))" style="padding:2px 8px;border-radius:5px;border:1px solid #16a34a;color:${v==="ok"?"#fff":"#16a34a"};background:${v==="ok"?"#16a34a":"transparent"};cursor:pointer;font-size:10px;font-weight:700;font-family:inherit">✓ صحيحة</button><button onclick="QS.verify['${e.text.replace(/'/g,"\'")}']='no';renderQAPage(RECS.find(x=>x.id===${r.id}))" style="padding:2px 8px;border-radius:5px;border:1px solid #dc2626;color:${v==="no"?"#fff":"#dc2626"};background:${v==="no"?"#dc2626":"transparent"};cursor:pointer;font-size:10px;font-weight:700;font-family:inherit">✗ غير صحيحة</button></div></div>`;});}
  else sumH+=`<div style="color:var(--text3);font-size:11px;text-align:center;padding:13px">لم يرصد المشرف ملاحظات</div>`;
  sumH+=`</div></div>`;
  const undH=`<div class="card"><div class="ch"><div class="ct2">➕ الملاحظات غير المرصودة</div><div style="font-size:10px;color:var(--text3)">ملاحظات لم يرصدها المشرف</div></div><div class="cb"><div id="qu-secs">${buildSecs(uSecs,QS.undE,QS.undO,"qu",false)}</div></div></div>`;
  const{supScore,matchRate,accScore,critScore,qaFlat,wrongCount}=calcQAScore(r);
  let critBtns="";[["immediate","✅ فوري وكافٍ","#16a34a"],["late","⚠️ متأخر أو غير كافٍ","#ca8a04"],["none","❌ لم يتصرف","#dc2626"]].forEach(([v,l,c])=>{const isA=QCA===v;critBtns+=`<button onclick="QCA='${v}';renderQAPage(RECS.find(x=>x.id===${r.id}))" style="padding:6px 13px;border-radius:7px;border:1.5px solid ${c};color:${isA?"#fff":c};background:${isA?c:"transparent"};cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">${l}</button>`;});

  document.getElementById("pgcontent").innerHTML=sumH+undH+scoreH;
}
function calcQAScore(r){
  const cr=CR[r.type]||CR.RMS1;const uSecs=cr.muatamad||[];
  const uFlat=uSecs.flatMap(s=>(r.uE[s.id]||[]).map(e=>({...e,sec:s})));
  const qaFlat=uSecs.flatMap(s=>(QS.undE[s.id]||[]));
  const wrongCount=Object.values(QS.verify).filter(v=>v==="no").length;
  const matchCount=uFlat.filter(e=>QS.verify[e.text]!=="no").length;
  const totalEv=uFlat.length+qaFlat.length;
  const matchRate=totalEv?Math.round(matchCount/totalEv*100):100;
  const accScore=Math.round(matchRate*0.7);
  const hasCrit=uSecs.some(s=>(r.uE[s.id]||[]).some(e=>e.impact==="R"))||(r.cCrit&&r.cCrit.length>0);
  const critScore=!hasCrit?30:QCA==="immediate"?30:QCA==="late"?15:0;
  return{supScore:accScore+critScore,matchRate,accScore,critScore,qaFlat,wrongCount};
}
function submitQA(id,supScore,matchRate,wrongCount,undetCount,accScore,critScore){const r=RECS.find(x=>x.id===id);if(!r)return;const notes=gv("qa-notes");r.trail.push({t:new Date().toISOString(),user:CU.name,action:"تقييم الجودة",supScore,matchRate});r.supScore=supScore;r.matchRate=matchRate;r.wrongCount=wrongCount;r.undetectedCount=undetCount;r.qaCritAction=QCA;r.qaVerify={...QS.verify};r.qaUndE={...QS.undE};r.qaOfficer=CU.name;r.qaDate=new Date().toISOString();r.qaNotes=notes;save();updateToSheets_record(r);addLog("إرسال تقييم الجودة",`رقم ${r.rno} — نتيجة تقييم المشرف: ${supScore}%`,id);toast("✅ تم الإرسال لمشرف الجودة");pgMyCases();}
function prevF(name,data,type){const isImg=type&&type.startsWith("image/");const m=document.createElement("div");m.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer";m.onclick=()=>m.remove();m.innerHTML=isImg?`<div style="max-width:90%;max-height:90%;text-align:center"><img src="${data}" style="max-width:100%;max-height:80vh;border-radius:8px"><div style="color:var(--text2);font-size:12px;margin-top:9px">${name}</div></div>`:`<div style="background:var(--card);border-radius:11px;padding:22px;text-align:center"><div style="font-size:44px;margin-bottom:11px">📄</div><div style="color:var(--text);font-size:13px;margin-bottom:14px">${name}</div><a href="${data}" download="${name}" style="color:var(--g2);font-size:12px">⬇️ تحميل</a></div>`;document.body.appendChild(m);}

function openObjDec(id){const r=RECS.find(x=>x.id===id);if(!r)return;openModal("⚖️ البت في اعتراض المشرف",`<div style="border-radius:9px;padding:13px;border:1.5px solid rgba(220,38,38,0.4);background:rgba(220,38,38,0.06);margin-bottom:13px"><div style="font-size:11px;font-weight:700;color:#fca5a5;margin-bottom:7px">اعتراض المشرف — ${r.supObj?.user||""}</div><div style="font-size:12px;color:var(--text);background:rgba(27,107,58,0.04);border-radius:6px;padding:9px">${r.supObj?.reason||""}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px"><div style="padding:9px;background:rgba(27,107,58,0.04);border-radius:7px"><div class="fl" style="margin-bottom:4px">نتيجة تقييم المشرف</div><div style="font-size:20px;font-weight:800;color:${sc(r.supScore||0)}">${r.supScore||0}%</div></div><div style="padding:9px;background:rgba(27,107,58,0.04);border-radius:7px"><div class="fl" style="margin-bottom:4px">نسبة التوافق</div><div style="font-size:20px;font-weight:800;color:${sc(r.matchRate||0)}">${r.matchRate||0}%</div></div></div><div class="fg"><div class="fl">القرار والسبب</div><textarea class="fi" id="od-n" rows="3" placeholder="اكتب قرارك وسببه..."></textarea></div><div style="display:flex;gap:8px"><button class="btn bs" style="flex:1" onclick="decideObj(${id},'accept')">✅ قبول الاعتراض</button><button class="btn bd" style="flex:1" onclick="decideObj(${id},'reject')">❌ رفض الاعتراض</button></div>`,"700px");}

function pgMyResults(){
  // الربط بمعرّف ثابت (ID) لمنع كسر الربط عند اختلاف كتابة الاسم
  const my=RECS.filter(r=>
    r.madkhalInvId===CU.id||r.muatamadInvId===CU.id||
    r.callInvId===CU.id||r.mcInvId===CU.id||
    // توافق مع السجلات القديمة المبنية على الاسم (قبل هذا التحديث)
    (!r.madkhalInvId&&!r.muatamadInvId&&!r.callInvId&&!r.mcInvId&&
     (r.madkhalName===CU.name||r.muatamadName===CU.name||r.callName===CU.name||r.mcName===CU.name))
  ).filter(r=>r.status!=="draft").sort((a,b)=>b.id-a.id);

  const rows=my.map(r=>{
    const cr=CR[r.type]||CR.RMS1;
    // تحديد كل الأدوار التي قام بها هذا المحقق في هذه الحالة (قد يكون له أكثر من دور)
    const roles=[];
    if(r.madkhalInvId===CU.id||(!r.madkhalInvId&&r.madkhalName===CU.name&&r.madkhalName))
      roles.push({label:"المدخل",score:r.mScore,icon:"📥"});
    if(r.muatamadInvId===CU.id||(!r.muatamadInvId&&r.muatamadName===CU.name&&r.muatamadName))
      roles.push({label:cr.label==="Field ميداني"?"التقرير الميداني":"المعتمد",score:r.uScore,icon:"✅"});
    if(r.callInvId===CU.id||(!r.callInvId&&r.callName===CU.name&&r.callName))
      roles.push({label:cr.hasVideo?"الفيديو":"مكالمة المدخل",score:r.cScore,icon:cr.hasVideo?"🎥":"📞"});
    if(r.mcInvId===CU.id||(!r.mcInvId&&r.mcName===CU.name&&r.mcName))
      roles.push({label:"مكالمة المعتمد",score:r.mcScore,icon:"📞"});

    const rolesH=roles.map(rl=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
      <span style="font-size:10px;color:var(--text3)">${rl.icon} ${rl.label}:</span>${pill(rl.score)}
    </div>`).join("")||"—";

    const canObj=r.status==="approved"&&!r.invObj;
    return`<tr>
      <td><strong style="color:var(--g1)">${esc(r.rno)}</strong></td>
      <td>${tbdg(r.type)}</td>
      <td style="color:var(--text2)">${esc(r.supName||"—")}</td>
      <td>${rolesH}</td>
      <td>${sbdg(r.status)}</td>
      <td style="white-space:nowrap">
        <button class="btn bg btn-xs" onclick="openDet(${r.id})" style="margin-left:3px">🔍 التفاصيل</button>
        ${canObj?`<button onclick="openInvObj(${r.id})" style="padding:3px 9px;border-radius:6px;border:1.5px solid var(--purple);color:var(--purple);background:transparent;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit">⚠️ اعتراض</button>`:""}
        ${r.invObj?.reply?`<span style="font-size:10px;font-weight:700;color:${r.invObj.reply.dec==="accept"?"var(--green)":"var(--red)"}">${r.invObj.reply.dec==="accept"?"✅ مقبول":"❌ مرفوض"}</span>`:""}
      </td>
    </tr>`;
  }).join("")||`<tr><td colspan="6" class="empty" style="padding:36px"><div class="empty-ic">📊</div><p>لا توجد نتائج بعد</p></td></tr>`;

  document.getElementById("pgcontent").innerHTML=`<div class="card">
    <div class="ch"><div class="ct2"><div class="ct2-ic" style="background:rgba(27,107,58,.1)">📊</div>نتائجي (${my.length})</div></div>
    <div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>المشرف</th><th>أدواري ونتائجها</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}
function pgMyObj(){const my=RECS.filter(r=>r.invObj&&(r.madkhalName===CU.name||r.muatamadName===CU.name));const rows=my.map(r=>`<tr><td><strong style="color:var(--g1)">${esc(r.rno)}</strong></td><td>${tbdg(r.type)}</td><td><div style="font-size:11px;max-width:180px;color:#a78bfa">${r.invObj?.reason||""}</div></td><td>${r.invObj?.reply?`<span style="color:${r.invObj.reply.dec==="accept"?"#16a34a":"#dc2626"};font-weight:700">${r.invObj.reply.dec==="accept"?"✅ مقبول":"❌ مرفوض"}</span>`:"⏳ قيد المراجعة"}</td><td>${r.invObj?.reply?`<div style="font-size:11px;color:var(--text2);max-width:180px">${r.invObj.reply.reply}</div>`:"—"}</td></tr>`).join("")||`<tr><td colspan="5" style="text-align:center;padding:36px;color:var(--text3)">لا توجد اعتراضات</td></tr>`;document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">⚠️ اعتراضاتي (${my.length})</div></div><div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>سبب الاعتراض</th><th>القرار</th><th>رد المشرف</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}
function openInvObj(id){openModal("⚠️ اعتراض على التقييم",`<div style="background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.3);color:var(--g1);padding:9px 13px;border-radius:7px;font-size:11px;margin-bottom:12px">ℹ️ سيُرسل اعتراضك للمشرف المسؤول للرد عليه</div><div class="fg"><div class="fl">سبب الاعتراض</div><textarea class="fi" id="io-r" rows="4" placeholder="اكتب سبب اعتراضك..."></textarea></div><button class="btn bw" style="width:100%" onclick="submitInvObj(${id})">⚠️ تقديم الاعتراض</button>`);}

function buildRecsTable(recs){
  if(!recs.length) return`<div class="empty"><div class="empty-ic">📭</div><p>لا توجد نتائج</p></div>`;
  const rows=recs.map(r=>{
    const cr=CR[r.type]||CR.RMS1;
    const callTitle=r.callName?`title="${cr.hasVideo?"الفيديو":(r.type==="RMS2"?"مكالمة المدخل":"المكالمة")}: ${esc(r.callName)}"`:"";
    const mcTitle=r.mcName?`title="مكالمة المعتمد: ${esc(r.mcName)}"`:"";
    return`<tr>
    <td><strong style="color:var(--g1)">${esc(r.rno)}</strong>
      <button class="cpb" onclick="cpT('${r.rno}')">📋</button></td>
    <td>${tbdg(r.type)}</td>
    <td style="color:var(--text2);font-size:11px">${esc(r.supName||"—")}</td>
    <td style="color:var(--text2);font-size:11px">${esc(r.muatamadName||"—")}</td>
    <td>${pill(r.mScore)}</td><td>${pill(r.uScore)}</td>
    <td ${callTitle}>${pill(r.cScore)}</td>
    <td ${mcTitle}>${pill(r.mcScore)}</td>
    <td>${pill(r.supScore)}</td>
    <td>${sbdg(r.status)}</td>
    <td><button class="btn bg btn-xs" onclick="openDet(${r.id})">🔍</button></td>
  </tr>`;}).join("");
  return`<div class="twrap"><table>
    <thead><tr><th>رقم الحالة</th><th>النوع</th><th>المشرف</th><th>المعتمد</th>
      <th>المدخل%</th><th>نتيجة التقييم</th><th>📞 مكالمة 1</th><th>📞 مكالمة المعتمد</th><th>نتيجة المشرف</th><th>الحالة</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function applyRecFilter(){
  const f={
    search: document.getElementById("rf-search")?.value.trim().toLowerCase()||"",
    type:   document.getElementById("rf-type")?.value||"",
    status: document.getElementById("rf-status")?.value||"",
    sup:    document.getElementById("rf-sup")?.value||"",
    dateFrom:document.getElementById("rf-from")?.value||"",
    dateTo:  document.getElementById("rf-to")?.value||"",
  };
  window._recFilter=f;
  let recs=RECS.filter(r=>{
    if(f.type   && r.type!==f.type) return false;
    if(f.status && r.status!==f.status) return false;
    if(f.sup    && r.supName!==f.sup) return false;
    if(f.dateFrom){const d=new Date(f.dateFrom);d.setHours(0,0,0,0);if(new Date(r.createdAt)<d)return false;}
    if(f.dateTo) {const d=new Date(f.dateTo);d.setHours(23,59,59,999);if(new Date(r.createdAt)>d)return false;}
    if(f.search){
      const s=(r.rno+" "+r.supName+" "+r.muatamadName+" "+r.madkhalName).toLowerCase();
      if(!s.includes(f.search))return false;
    }
    return true;
  }).sort((a,b)=>b.id-a.id);
  const tbody=document.getElementById("recs-tbody");
  if(tbody) tbody.innerHTML=buildRecsTable(recs);
  const badge=document.getElementById("recs-badge");
  if(badge){badge.textContent=recs.length;badge.style.background=recs.length<RECS.length?"#b45309":"var(--g1)";}
}

function exportRecsExcel(){
  const f=window._recFilter||{};
  let recs=RECS.filter(r=>{
    if(f.type&&r.type!==f.type)return false;
    if(f.status&&r.status!==f.status)return false;
    if(f.sup&&r.supName!==f.sup)return false;
    return true;
  });
  const STATUS_AR={draft:"مسودة",submitted:"بانتظار الجودة",qa_review:"قيد المراجعة",
    approved:"معتمد",returned:"مُعاد",inv_obj:"اعتراض محقق",sup_obj:"اعتراض مشرف"};
  const TYPE_AR={RMS1:"RMS 1.0",RMS2:"RMS 2.0",FIELD:"Field"};
  const BOM="﻿";
  const headers=["رقم الحالة","النوع","المشرف","المعتمد","المدخل%","نتيجة التقييم","مكالمة%","نتيجة المشرف","نسبة التوافق","الحالة","تاريخ الإنشاء"];
  const rows=recs.map(r=>[
    `"${r.rno||""}"`,`"${TYPE_AR[r.type]||r.type}"`,
    `"${r.supName||""}"`,`"${r.muatamadName||""}"`,
    r.mScore!=null?r.mScore:"",r.uScore!=null?r.uScore:"",
    r.cScore!=null?r.cScore:"",r.supScore!=null?r.supScore:"",
    r.matchRate!=null?r.matchRate:"",
    `"${STATUS_AR[r.status]||r.status}"`,
    `"${r.createdAt?new Date(r.createdAt).toLocaleDateString("ar-SA"):""}"`,
  ].join(",")).join("\n");
  const blob=new Blob([BOM+headers.join(",")+"\n"+rows],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`تقييمات_نجم_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();URL.revokeObjectURL(url);
  toast("✅ تم التصدير بنجاح");
}

function printRecs(){
  const old=document.title;
  document.title=`سجل التقييمات — نجم — ${new Date().toLocaleDateString("ar-SA")}`;
  window.print();
  document.title=old;
}

    </tr></thead><tbody>${recR}</tbody></table></div>
  </div>

function pgCompare(){const supMap={};RECS.filter(r=>r.supScore!=null).forEach(r=>{const s=r.supName||"غير محدد";if(!supMap[s])supMap[s]={scores:[],match:[]};supMap[s].scores.push(r.supScore);if(r.matchRate!=null)supMap[s].match.push(r.matchRate);});let rows="";Object.entries(supMap).forEach(([n,d])=>{const avg=Math.round(d.scores.reduce((s,x)=>s+x,0)/d.scores.length);const ma=d.match.length?Math.round(d.match.reduce((s,x)=>s+x,0)/d.match.length):null;rows+=`<tr><td><strong>${n}</strong></td><td style="text-align:center">${d.scores.length}</td><td style="text-align:center">${pill(avg)}</td><td style="text-align:center">${ma!=null?`<span style="color:${sc(ma)};font-weight:700">${ma}%</span>`:"—"}</td></tr>`;});if(!rows)rows=`<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text3)">لا توجد بيانات</td></tr>`;document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">👨‍💼 مقارنة أداء المشرفين</div></div><div class="twrap"><table><thead><tr><th>المشرف</th><th>عدد الحالات</th><th>متوسط نتيجة تقييم المشرف</th><th>متوسط نسبة التوافق</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}

function buildLogTable(logs){
  if(!logs.length) return `<div class="empty"><div class="empty-ic">📭</div><p>لا توجد سجلات تطابق الفلتر</p></div>`;

  const ACTION_META = {
    "إضافة مستخدم":      {c:"#1B6B3A",ic:"👤"},
    "تعديل مستخدم":      {c:"#1d4ed8",ic:"✏️"},
    "تفعيل مستخدم":      {c:"#228B47",ic:"✅"},
    "إيقاف مستخدم":      {c:"#dc2626",ic:"⛔"},
    "إرسال تقييم":       {c:"#1d4ed8",ic:"📤"},
    "حفظ مسودة":         {c:"#6B8F79",ic:"💾"},
    "إرسال تقييل الجودة":{c:"#6d28d9",ic:"🔍"},
    "إرسال تقييم الجودة":{c:"#6d28d9",ic:"🔍"},
    "اعتماد تقييم":      {c:"#1B6B3A",ic:"✅"},
    "إعادة التقييم":     {c:"#c2410c",ic:"🔄"},
    "اعتراض المحقق":     {c:"#6d28d9",ic:"⚠️"},
    "اعتراض المشرف":     {c:"#dc2626",ic:"🚨"},
    "قبول اعتراض المحقق":{c:"#1B6B3A",ic:"✅"},
    "رفض اعتراض المحقق": {c:"#dc2626",ic:"❌"},
    "قبول اعتراض المشرف":{c:"#1B6B3A",ic:"✅"},
    "رفض اعتراض المشرف": {c:"#dc2626",ic:"❌"},
    "بدء مراجعة الجودة": {c:"#1d4ed8",ic:"🔍"},
    "تسجيل دخول ناجح":  {c:"#1B6B3A",ic:"🔐"},
    "محاولة دخول فاشلة": {c:"#dc2626",ic:"🚨"},
  };
  function getMeta(action){
    const key=Object.keys(ACTION_META).find(k=>action&&action.includes(k));
    return key?ACTION_META[key]:{c:"#6B8F79",ic:"📝"};
  }

  const rows = logs.map((l,i)=>{
    const meta = getMeta(l.action);
    const dt = new Date(l.t);
    const dateStr = dt.toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});
    const timeStr = dt.toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    const isSec = l.source==="security";
    const recLink = l.rid?RECS.find(r=>r.id===l.rid):null;
    return`<tr style="${i%2===0?"":"background:rgba(27,107,58,.02)"}">
      <td style="width:30px;text-align:center">
        <div style="width:32px;height:32px;border-radius:8px;background:${meta.c}12;border:1px solid ${meta.c}25;
          display:flex;align-items:center;justify-content:center;font-size:14px">${meta.ic}</div>
      </td>
      <td>
        <div style="font-size:11px;font-weight:700;color:${meta.c};margin-bottom:2px">${l.action||"—"}</div>
        ${isSec?`<span style="font-size:9px;background:rgba(220,38,38,.1);color:#dc2626;padding:1px 6px;border-radius:10px;border:1px solid rgba(220,38,38,.2)">🔒 أمن</span>`:""}
      </td>
      <td style="max-width:220px">
        <div style="font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${l.detail||""}">${l.detail||"—"}</div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:26px;height:26px;border-radius:7px;background:var(--g1);

          <span style="font-size:11px;font-weight:600;color:var(--text)">${l.user||"—"}</span>
        </div>
      </td>
      <td>
        <div style="font-size:11px;font-weight:600;color:var(--text)">${dateStr}</div>
        <div style="font-size:10px;color:var(--text3)">${timeStr}</div>
      </td>
      <td>
        ${recLink?`<button class="btn bg btn-xs" onclick="openDet(${recLink.id})" style="font-size:9px">🔍 ${recLink.rno}</button>`

  }).join("");

  return`<div class="twrap">

        <th>الحدث</th>
        <th>التفاصيل</th>
        <th>المستخدم</th>

        <th>الحالة المرتبطة</th>
