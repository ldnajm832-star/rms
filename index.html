const SESSION_KEY = "rms_session";
const SESSION_TIMEOUT = 15 * 60 * 1000; // 15 دقيقة
let sessionTimer = null;

function saveSession() {
  const session = {
    user: CU,
    recs: RECS,
    alog: ALOG,
    rr: RR,
    expiry: Date.now() + SESSION_TIMEOUT,
  };
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const session = JSON.parse(raw);
    if (!session.expiry || Date.now() > session.expiry) {
      localStorage.removeItem(SESSION_KEY);
      return false;
    }
    // استعادة البيانات
    CU = session.user;
    RECS = session.recs || [];
    ALOG = session.alog || [];
    RR = session.rr || 0;
    return true;
  } catch(e) {
    return false;
  }
}

function resetSessionTimer() {
  if (sessionTimer) clearTimeout(sessionTimer);
  sessionTimer = setTimeout(() => {
    // انتهت الجلسة
    saveSession(); // حفظ أخير
    showSessionExpired();
  }, SESSION_TIMEOUT);
  // تحديث وقت انتهاء الجلسة
  const raw = localStorage.getItem(SESSION_KEY);
  if (raw) {
    try {
      const s = JSON.parse(raw);
      s.expiry = Date.now() + SESSION_TIMEOUT;
      localStorage.setItem(SESSION_KEY, JSON.stringify(s));
    } catch(e) {}
  }
}

function showSessionExpired() {
  const el = document.createElement("div");
  el.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,0.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px";

const API_URL = "https://script.google.com/macros/s/AKfycbyLIIzhtM4kbEwV6p3ak3n3dZ8TjtPOA4Mb-qS4a0eUJO4a9ixkzeq8RFgKQRlqyg/exec";
let API_READY = false;

function apiCall(action, data={}) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const params = new URLSearchParams({action, callback: cbName, ...flattenData(data)});
    window[cbName] = function(json) {
      delete window[cbName];
      document.getElementById(cbName+"_script")?.remove();
      if(json.error) reject(new Error(json.error));
      else resolve(json);
    };
    const script = document.createElement("script");
    script.id = cbName + "_script";
    script.src = API_URL + "?" + params.toString();
    script.onerror = () => { delete window[cbName]; reject(new Error("Network error")); };
    document.head.appendChild(script);
    setTimeout(() => { delete window[cbName]; document.getElementById(cbName+"_script")?.remove(); reject(new Error("Timeout")); }, 15000);
  });
}

function flattenData(data) {
  const result = {};
  Object.keys(data).forEach(k => {
    if(typeof data[k] === "object") result[k] = JSON.stringify(data[k]);
    else result[k] = data[k];
  });
  return result;
}

async function loadFromSheets() {
  showLoading("جاري تحميل البيانات...");
  try {
    // تحميل المستخدمين
    const usersRes = await apiCall("getUsers");
    if(usersRes.users) {
      localStorage.setItem("rms_users", JSON.stringify(usersRes.users));
    }
    // تحميل التقييمات
    const recsRes = await apiCall("getRecords");
    if(recsRes.records) {
      RECS = recsRes.records;
    }
    // تحميل الـ RR
    const rrRes = await apiCall("getRR");
    if(rrRes.value !== undefined) {
      RR = rrRes.value;
    }
    API_READY = true;
    hideLoading();
  } catch(err) {
    hideLoading();
    showError("تعذر الاتصال بالخادم — يعمل بالوضع المحلي");
    API_READY = false;
  }
}

async function saveToSheets_record(rec) {
  if(!API_READY) return;
  try { await apiCall("saveRecord", {record: rec}); } catch(e) {}
}

async function updateToSheets_record(rec) {
  if(!API_READY) return;
  try { await apiCall("updateRecord", {record: rec}); } catch(e) {}
}

async function saveToSheets_users(users) {
  if(!API_READY) return;
  try { await apiCall("saveUsers", {users}); } catch(e) {}
}

async function saveToSheets_rr(val) {
  if(!API_READY) return;
  try { await apiCall("setRR", {value: val}); } catch(e) {}
}

async function addToSheets_log(entry) {
  if(!API_READY) return;
  try { await apiCall("addLog", {entry}); } catch(e) {}
}

// ═══ SCORE ENGINE ═══
function secScore(sec,items,isCall){if(!items||!items.length)return sec.weight;if(isCall)return Math.max(0,sec.weight-items.reduce((s,i)=>s+i.deduction,0));if(items.some(i=>i.impact==="R"))return 0;let d=0;items.forEach(i=>{if(i.impact==="O")d+=Math.ceil(sec.weight/2);else if(i.impact==="Y")d+=1;});return Math.max(0,sec.weight-d);}
function totScore(secs,eMap,isCall){if(!secs)return 100;return Math.round(secs.reduce((t,s)=>t+secScore(s,eMap[s.id]||[],isCall),0));}
function callScore(secs,eMap,crits){if(crits&&crits.length)return 0;return totScore(secs,eMap,true);}

// ═══ SECTION BUILDER ═══
function buildSecs(secs,eMap,oMap,prefix,isCall){
  if(!secs||!secs.length)return"";
  return secs.map(sec=>{
    const sel=eMap[sec.id]||[];
    const isOpen=!!oMap[prefix+"_"+sec.id];
    const ss=secScore(sec,sel,isCall);
    const pct=Math.round(ss/sec.weight*100);
    const sc2=pct>=100?"#16a34a":pct===0?"#dc2626":"#ca8a04";
    const chips=sel.map(item=>`<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:11px;font-size:10px;font-weight:600;color:#fff;background:${sec.color};border:1px solid ${sec.color}">
      <button onclick="event.stopPropagation();rmE('${prefix}',${sec.id},'${item.text.replace(/'/g,"\'")}',${isCall})" style="background:none;border:none;cursor:pointer;color:#fff;font-size:12px;padding:0;line-height:1;opacity:.8">×</button>
      ${isCall?"-"+item.deduction+" | ":""}${item.text}</span>`).join("");
    const dis=sec.items.map((item,idx)=>{
      const isSel=sel.some(s=>s.text===item.text);
      const ik=item.impact||"O";
      const ic=isCall?sec.color:IMP[ik].c;
      const ded=isCall?"-"+item.deduction:(ik==="R"?"القسم":ik==="O"?"½":"1");
      return`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);${isSel?`background:${ic}18`:""}" onclick="event.stopPropagation();togE('${prefix}',${sec.id},${idx},${isCall})">
        <div style="width:14px;height:14px;border-radius:3px;border:1.5px solid ${isSel?ic:"rgba(255,255,255,0.2)"};flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;background:${isSel?ic:"transparent"};color:#fff">${isSel?"✓":""}</div>
        <div style="font-size:11px;line-height:1.5;flex:1;color:${isSel?ic:"#94a3b8"}">${isCall?"":IMP[ik].e+" "}${item.text}</div>
        <span style="font-size:9px;font-weight:700;color:${ic}">${ded}</span>
      </div>`;
    }).join("");
    return`<div style="border-radius:10px;border:1.5px solid ${sel.length?sec.color:"rgba(255,255,255,0.08)"};overflow:visible;margin-bottom:9px">
      <div style="padding:9px 13px;display:flex;align-items:center;justify-content:space-between;background:${sel.length?sec.color+"11":"rgba(255,255,255,0.02)"};flex-wrap:wrap;gap:5px">
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:12px;font-weight:700;color:${sec.color}">${sec.label}</span>
          <span style="font-size:10px;color:#64748b;padding:2px 6px;border-radius:7px;background:rgba(255,255,255,0.05)">وزن ${sec.weight}%</span>
          ${sel.length?`<span style="font-size:10px;font-weight:700;color:#fff;padding:1px 6px;border-radius:7px;background:${sec.color}">${sel.length}</span>`:""}
        </div>
        <span style="font-size:11px;font-weight:800;padding:2px 9px;border-radius:11px;border:1.5px solid ${sc2};color:${sc2};background:${sc2}22">${ss}/${sec.weight}</span>
      </div>
      <div style="padding:9px 13px 11px;border-top:1px solid rgba(255,255,255,0.06)">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-radius:7px;border:1.5px solid ${isOpen?sec.color:"rgba(255,255,255,0.09)"};background:rgba(255,255,255,0.03);cursor:pointer;user-select:none" onclick="togD('${prefix}',${sec.id})">
          <span style="font-size:12px;color:${sel.length?sec.color:"#94a3b8"}">${sel.length?sel.length+" ملاحظة مختارة":"اختر الملاحظات"}</span>
          <span style="font-size:10px;color:#64748b;transition:transform .2s;display:inline-block;transform:rotate(${isOpen?180:0}deg)">▼</span>
        </div>
        <div style="background:#0f172a;border:1.5px solid ${sec.color};border-radius:8px;margin-top:5px;${isOpen?"display:block":"display:none"};max-height:230px;overflow-y:auto">${dis}</div>
        ${sel.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:7px">${chips}</div>`:""}
      </div>
    </div>`;
  }).join("");
}

function getMap(prefix){
  const cr=CR[prefix==="qu"?(QS.type||"RMS1"):ES.type]||CR.RMS1;
  const M={
    m:{secs:cr.madkhal,eMap:ES.mE,oMap:ES.mO,isCall:false},
    u:{secs:cr.muatamad,eMap:ES.uE,oMap:ES.uO,isCall:false},
    c:{secs:cr.call||cr.video,eMap:ES.cE,oMap:ES.cO,isCall:true},
    mc:{secs:cr.muatamadCall||cr.madkhalCall,eMap:ES.mcE,oMap:ES.mcO,isCall:true},
    qu:{secs:(CR[QS.type]||CR.RMS1).muatamad,eMap:QS.undE,oMap:QS.undO,isCall:false},
  };
  return M[prefix]||{secs:[],eMap:{},oMap:{},isCall:false};
}
function togD(prefix,secId){
  const{oMap,secs,eMap,isCall}=getMap(prefix);
  const key=prefix+"_"+secId;
  Object.keys(oMap).forEach(k=>{if(k!==key)oMap[k]=false;});
  oMap[key]=!oMap[key];
  const el=document.getElementById(prefix+"-secs");
  if(el)el.innerHTML=buildSecs(secs,eMap,oMap,prefix,isCall);
  updScores();
}
function togE(prefix,secId,idx,isCall){
  const{secs,eMap,oMap}=getMap(prefix);
  const sec=(secs||[]).find(s=>s.id===secId);if(!sec)return;
  const item=sec.items[idx];
  if(prefix==="qu"){const r=RECS.find(x=>x.id===QS.recId);if(r&&(r.uE[secId]||[]).some(e=>e.text===item.text)){toast("هذه الملاحظة مرصودة — راجعها في قسم التحقق","#ca8a04");return;}}
  if(!eMap[secId])eMap[secId]=[];
  const pos=eMap[secId].findIndex(e=>e.text===item.text);
  if(pos>=0)eMap[secId].splice(pos,1);else eMap[secId].push(item);
  const el=document.getElementById(prefix+"-secs");
  if(el)el.innerHTML=buildSecs(secs,eMap,oMap,prefix,isCall);
  if(prefix==="qu"){const r=RECS.find(x=>x.id===QS.recId);if(r)renderQAPage(r);}
  else updScores();
}
function rmE(prefix,secId,text,isCall){
  const{secs,eMap,oMap}=getMap(prefix);
  if(eMap[secId])eMap[secId]=eMap[secId].filter(e=>e.text!==text);
  const el=document.getElementById(prefix+"-secs");
  if(el)el.innerHTML=buildSecs(secs,eMap,oMap,prefix,isCall);
  if(prefix==="qu"){const r=RECS.find(x=>x.id===QS.recId);if(r)renderQAPage(r);}
  else updScores();
}
function togCrit(prefix,text){
  const arr=prefix==="c"?ES.cCrit:ES.mcCrit;
  const idx=arr.indexOf(text);if(idx>=0)arr.splice(idx,1);else arr.push(text);
  const cr=CR[ES.type]||CR.RMS1;
  const list=prefix==="c"?(cr.callCritical||cr.videoCritical||[]):(cr.callCritical||[]);
  const el=document.getElementById(prefix+"-crits");
  if(el)el.innerHTML=buildCritList(prefix,list,arr);
  updScores();
}
function buildCritList(prefix,list,sel){
  return list.map(text=>{const s=sel.includes(text);return`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);${s?"background:rgba(192,0,0,0.1)":""}" onclick="togCrit('${prefix}','${text.replace(/'/g,"\'")}')">
    <div style="width:14px;height:14px;border-radius:3px;border:1.5px solid ${s?"#c00000":"rgba(255,255,255,0.2)"};flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;background:${s?"#c00000":"transparent"};color:#fff">${s?"✓":""}</div>
    <div style="font-size:11px;flex:1;color:${s?"#c00000":"#94a3b8"}">🔴 ${text}</div>
    <span style="font-size:9px;font-weight:700;color:#c00000">تصفير</span>
  </div>`;}).join("");
}
function secBarsH(secs,eMap,isCall){
  if(!secs)return"";
  return secs.map(s=>{const items=eMap[s.id]||[];const ss=secScore(s,items,isCall);const pct=Math.round(ss/s.weight*100);const bc=pct>=100?s.color:pct===0?"#dc2626":"#f59e0b";
    return`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="font-size:9px;color:#64748b;text-align:right;min-width:85px">${s.label}</div><div style="flex:1;height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden"><div style="height:100%;border-radius:3px;width:${pct}%;background:${bc};transition:width .4s"></div></div><div style="font-size:9px;min-width:24px;text-align:center;font-weight:700;color:${bc}">${ss}</div><div style="font-size:9px;min-width:20px;color:#475569">/${s.weight}</div></div>`;
  }).join("");
}
function updScores(){
  const cr=CR[ES.type]||CR.RMS1;
  [{p:"m",secs:cr.madkhal,eMap:ES.mE,isCall:false,crits:null},{p:"u",secs:cr.muatamad,eMap:ES.uE,isCall:false,crits:null},{p:"c",secs:cr.call||cr.video,eMap:ES.cE,isCall:true,crits:ES.cCrit},{p:"mc",secs:cr.muatamadCall||cr.madkhalCall,eMap:ES.mcE,isCall:true,crits:ES.mcCrit}].forEach(({p,secs,eMap,isCall,crits})=>{
    if(!secs)return;
    const s=isCall?callScore(secs,eMap,crits||[]):totScore(secs,eMap,false);
    const el=document.getElementById(p+"-cir");if(el){el.textContent=s+"%";el.style.color=sc(s);el.style.borderColor=sc(s);el.style.background=sb(s);}
    const b=document.getElementById(p+"-bars");if(b)b.innerHTML=secBarsH(secs,eMap,isCall);
  });
  const allErr=[...Object.values(ES.mE),...Object.values(ES.uE)].flat();
  const hasCrit=allErr.some(e=>e.impact==="R");const hasOr=allErr.some(e=>e.impact==="O");
  const corrEl=document.getElementById("ev-corr");
  if(corrEl&&!corrEl.dataset.mod)corrEl.value=hasCrit?AUTO_CORR.R:hasOr?AUTO_CORR.O:allErr.length?AUTO_CORR.Y:"";
}

function callPhase(prefix,secs,eMap,oMap,crits,critList,label,nameId,score){
  if(!secs)return"";
  return`<div style="border-radius:9px;border:1.5px solid rgba(91,33,182,0.3);overflow:visible;margin-top:11px">
    <div style="padding:10px 13px;display:flex;align-items:center;justify-content:space-between;background:rgba(91,33,182,0.06);font-size:12px;font-weight:700;color:#c4b5fd;flex-wrap:wrap;gap:7px">
      <div>${label}</div>
      <div style="display:flex;gap:7px;flex-wrap:wrap">
        <input class="fi" id="${nameId}-n" placeholder="اسم الموظف" style="width:130px;font-size:11px">
        <input class="fi" id="${nameId}-e" placeholder="الرقم الوظيفي" style="width:110px;font-size:11px">
      </div>
    </div>
    <div style="padding:13px;border-top:1px solid rgba(255,255,255,0.07)">
      <div id="${prefix}-secs">${buildSecs(secs,eMap,oMap,prefix,true)}</div>
      <div class="card" style="border-color:rgba(220,38,38,0.3);margin-top:9px">
        <div class="ch" style="background:rgba(220,38,38,0.06)"><div class="ct2" style="color:#dc2626;font-size:11px">🔴 الأخطاء الجسيمة</div></div>
        <div class="cb">${crits.length?`<div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:7px;padding:8px;margin-bottom:9px;font-size:11px;color:#fca5a5">⚠️ يوجد خطأ جسيم — النتيجة صفر</div>`:""}
          <div id="${prefix}-crits">${buildCritList(prefix,critList||[],crits)}</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border-radius:9px;padding:13px;border:1px solid rgba(255,255,255,0.07);margin-top:11px">
        <div style="display:flex;align-items:center;gap:14px">
          <div id="${prefix}-cir" style="width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;border:3px solid ${sc(score||0)};color:${sc(score||0)};background:${sb(score||0)};flex-shrink:0">${score!=null?score:0}%</div>
          <div style="flex:1"><div style="font-size:11px;color:#64748b;margin-bottom:5px">نتيجة ${label}</div><div id="${prefix}-bars">${secBarsH(secs,eMap,true)}</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

function handleF(files){Array.from(files).forEach(file=>{if(ES.files.length>=5){toast("الحد الأقصى 5 ملفات","#dc2626");return;}if(ES.files.some(f=>f.name===file.name))return;const r=new FileReader();r.onload=e=>{ES.files.push({name:file.name,size:file.size,type:file.type,data:e.target.result});renderFList();};r.readAsDataURL(file);});}
function renderFList(){const el=document.getElementById("flist");if(!el)return;el.innerHTML=ES.files.map((f,i)=>{const isImg=f.type.startsWith("image/");const sz=f.size>1048576?(f.size/1048576).toFixed(1)+"MB":(f.size/1024).toFixed(0)+"KB";return`<div style="display:flex;align-items:center;gap:7px;padding:6px 9px;background:rgba(255,255,255,0.05);border-radius:7px;border:1px solid rgba(255,255,255,0.08)">${isImg?`<img src="${f.data}" style="width:28px;height:28px;object-fit:cover;border-radius:3px">`:"<span style='font-size:16px'>📄</span>"}<div style="flex:1;min-width:0"><div style="font-size:11px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</div><div style="font-size:10px;color:#64748b">${sz}</div></div><button onclick="ES.files.splice(${i},1);renderFList()" style="background:none;border:none;cursor:pointer;color:#64748b;font-size:13px">×</button></div>`;}).join("");}

function saveEval(status){
  const rno=gv("ev-rno");if(!rno){toast("الرجاء إدخال رقم الحالة","#dc2626");return;}
  const cr=CR[ES.type]||CR.RMS1;
  const ms=cr.hasMadkhal?totScore(cr.madkhal,ES.mE,false):null;
  const us=totScore(cr.muatamad,ES.uE,false);
  const cSecs=cr.call||cr.video;const cs=cSecs?callScore(cSecs,ES.cE,ES.cCrit):null;
  const mcSecs=cr.muatamadCall||cr.madkhalCall;const mcs=mcSecs?callScore(mcSecs,ES.mcE,ES.mcCrit):null;
  const qa=status==="submitted"?assignQA():{id:null,name:null};
  const rec={
    id:Date.now(),createdAt:new Date().toISOString(),type:ES.type,rno,
    rdate:gv("ev-rd"),supId:CU.id,supName:CU.name,edate:gv("ev-ed"),
    status,qaId:qa.id,qaName:qa.name,
    madkhalName:gv("mn")||"",madkhalEid:gv("me")||"",madkhalSup:gv("ms")||"",
    mE:JSON.parse(JSON.stringify(ES.mE)),mScore:ms,
    muatamadName:gv("un")||"",muatamadEid:gv("ue")||"",muatamadSup:gv("usp")||"",
    uE:JSON.parse(JSON.stringify(ES.uE)),uScore:us,
    callName:gv("c-n")||gv("cv-n")||"",callEid:gv("c-e")||gv("cv-e")||"",
    cE:JSON.parse(JSON.stringify(ES.cE)),cCrit:[...ES.cCrit],cScore:cs,
    mcName:gv("mc-n")||"",mcEid:gv("mc-e")||"",
    mcE:JSON.parse(JSON.stringify(ES.mcE)),mcCrit:[...ES.mcCrit],mcScore:mcs,
    action:gv("ev-action"),files:ES.files.map(f=>({name:f.name,size:f.size,type:f.type,data:f.data})),
    corrective:gv("ev-corr"),rootCause:gv("ev-root"),actionTaken:gv("ev-act"),
    supScore:null,matchRate:null,undetCount:null,wrongCount:null,
    qaVerify:{},qaUndE:{},qaOfficer:null,qaDate:null,qaNotes:null,qaCritAction:null,
    invObj:null,supObj:null,objDecision:null,
    trail:[{t:new Date().toISOString(),user:CU.name,action:status==="submitted"?"إرسال للجودة":"حفظ مسودة",note:""}],
  };
  RECS.push(rec);save();saveToSheets_record(rec);
  addLog(status==="submitted"?"إرسال تقييم":"حفظ مسودة",`${ES.type} — رقم ${rno}${qa.name?" — مُسند لـ "+qa.name:""}`,rec.id);
  toast(status==="submitted"?`✅ تم الإرسال — مُسند لـ ${qa.name||"—"}`:"💾 تم حفظ المسودة");
  goTo("my_evals");
}

function openSupObj(id){openModal("⚠️ اعتراض المشرف على تقييم الجودة",`<div style="background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.3);color:#93c5fd;padding:9px 13px;border-radius:7px;font-size:11px;margin-bottom:12px">ℹ️ سيُرسل اعتراضك لمشرف الجودة للبت فيه نهائياً</div><div class="fg"><div class="fl">سبب الاعتراض</div><textarea class="fi" id="so-r" rows="4" placeholder="اكتب سبب اعتراضك..."></textarea></div><button class="btn bw" style="width:100%" onclick="submitSupObj(${id})">⚠️ تقديم الاعتراض</button>`);}
function submitSupObj(id){const reason=gv("so-r");if(!reason){toast("اكتب سبب الاعتراض","#dc2626");return;}const r=RECS.find(x=>x.id===id);if(!r)return;r.supObj={reason,date:new Date().toISOString(),user:CU.name};r.status="sup_obj";r.trail.push({t:new Date().toISOString(),user:CU.name,action:"اعتراض المشرف",note:reason});save();updateToSheets_record(r);closeModal();toast("تم تقديم الاعتراض","#ca8a04");goTo("my_evals");}
function openReplyInv(id){const r=RECS.find(x=>x.id===id);if(!r)return;openModal("رد على اعتراض المحقق",`<div style="border-radius:9px;padding:13px;border:1.5px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.06);margin-bottom:13px"><div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:7px">اعتراض المحقق</div><div style="font-size:12px;color:#e2e8f0;background:rgba(255,255,255,0.03);border-radius:6px;padding:9px">${r.invObj?.reason||""}</div></div><div class="fg"><div class="fl">ردك على الاعتراض</div><textarea class="fi" id="ri-r" rows="3" placeholder="اكتب ردك..."></textarea></div><div style="display:flex;gap:8px"><button class="btn bs" style="flex:1" onclick="replyInv(${id},'accept')">✅ قبول الاعتراض</button><button class="btn bd" style="flex:1" onclick="replyInv(${id},'reject')">❌ رفض الاعتراض</button></div>`);}

function startQA(id){const r=RECS.find(x=>x.id===id);if(!r)return;r.status="qa_review";if(!r.trail.some(a=>a.action==="بدء مراجعة الجودة"))r.trail.push({t:new Date().toISOString(),user:CU.name,action:"بدء مراجعة الجودة",note:""});save();QS={recId:id,type:r.type,verify:{...r.qaVerify||{}},undE:{...r.qaUndE||{}},undO:{}};QCA=r.qaCritAction||null;renderQAPage(r);}

function renderQAPage(r){
  document.getElementById("ptitle").textContent="مراجعة الجودة — "+r.rno;
  document.getElementById("tacts").innerHTML=`<button class="btn bg btn-sm" onclick="pgMyCases()">← رجوع</button>`;
  const cr=CR[r.type]||CR.RMS1;const uSecs=cr.muatamad||[];
  const uFlat=uSecs.flatMap(s=>(r.uE[s.id]||[]).map(e=>({...e,sec:s})));
  let sumH=`<div class="card"><div class="ch"><div class="ct2">📋 ملخص التقييم ${tbdg(r.type)}</div><div style="display:flex;gap:7px;align-items:center"><span style="font-size:11px;color:#64748b">${r.rno}</span><button class="cpb" onclick="cpT('${r.rno}')">📋</button></div></div><div class="cb">
  <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px">
    ${r.mScore!=null?`<div style="text-align:center;padding:9px 14px;background:rgba(255,255,255,0.03);border-radius:7px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:16px;font-weight:800;color:${sc(r.mScore)}">${r.mScore}%</div><div style="font-size:10px;color:#64748b">المدخل</div></div>`:""}
    <div style="text-align:center;padding:9px 14px;background:rgba(255,255,255,0.03);border-radius:7px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:16px;font-weight:800;color:${sc(r.uScore)}">${r.uScore}%</div><div style="font-size:10px;color:#64748b">نتيجة تقييم المحقق</div></div>
    ${r.cScore!=null?`<div style="text-align:center;padding:9px 14px;background:rgba(255,255,255,0.03);border-radius:7px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:16px;font-weight:800;color:${sc(r.cScore)}">${r.cScore}%</div><div style="font-size:10px;color:#64748b">${cr.hasVideo?"الفيديو":"المكالمة"}</div></div>`:""}
  </div>
  <div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.07)">التحقق من ملاحظات المعتمد</div>`;
  if(uFlat.length){uFlat.forEach(e=>{const v=QS.verify[e.text];sumH+=`<div style="display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.07);margin-bottom:5px"><span style="font-size:13px">${IMP[e.impact].e}</span><div style="flex:1;font-size:11px;line-height:1.5;color:${v==="no"?"#475569":IMP[e.impact].c};${v==="no"?"text-decoration:line-through":""}">${e.text}<div style="font-size:10px;opacity:.7">${e.sec.label}</div></div><div style="display:flex;gap:5px"><button onclick="QS.verify['${e.text.replace(/'/g,"\'")}']='ok';renderQAPage(RECS.find(x=>x.id===${r.id}))" style="padding:2px 8px;border-radius:5px;border:1px solid #16a34a;color:${v==="ok"?"#fff":"#16a34a"};background:${v==="ok"?"#16a34a":"transparent"};cursor:pointer;font-size:10px;font-weight:700;font-family:inherit">✓ صحيحة</button><button onclick="QS.verify['${e.text.replace(/'/g,"\'")}']='no';renderQAPage(RECS.find(x=>x.id===${r.id}))" style="padding:2px 8px;border-radius:5px;border:1px solid #dc2626;color:${v==="no"?"#fff":"#dc2626"};background:${v==="no"?"#dc2626":"transparent"};cursor:pointer;font-size:10px;font-weight:700;font-family:inherit">✗ غير صحيحة</button></div></div>`;});}
  else sumH+=`<div style="color:#475569;font-size:11px;text-align:center;padding:13px">لم يرصد المشرف ملاحظات</div>`;
  sumH+=`</div></div>`;
  const undH=`<div class="card"><div class="ch"><div class="ct2">➕ الملاحظات غير المرصودة</div><div style="font-size:10px;color:#64748b">ملاحظات لم يرصدها المشرف</div></div><div class="cb"><div id="qu-secs">${buildSecs(uSecs,QS.undE,QS.undO,"qu",false)}</div></div></div>`;
  const{supScore,matchRate,accScore,critScore,qaFlat,wrongCount}=calcQAScore(r);
  let critBtns="";[["immediate","✅ فوري وكافٍ","#16a34a"],["late","⚠️ متأخر أو غير كافٍ","#ca8a04"],["none","❌ لم يتصرف","#dc2626"]].forEach(([v,l,c])=>{const isA=QCA===v;critBtns+=`<button onclick="QCA='${v}';renderQAPage(RECS.find(x=>x.id===${r.id}))" style="padding:6px 13px;border-radius:7px;border:1.5px solid ${c};color:${isA?"#fff":c};background:${isA?c:"transparent"};cursor:pointer;font-size:11px;font-weight:700;font-family:inherit">${l}</button>`;});
  let attachH=r.action?`<div style="background:rgba(255,255,255,0.03);border-radius:7px;padding:11px;margin-bottom:11px;border:1px solid rgba(255,255,255,0.08)"><div class="fl" style="margin-bottom:5px">الأكشن المتخذ من المشرف على الجوهريات</div><div style="font-size:12px;color:#e2e8f0;line-height:1.6">${r.action}</div>${r.files&&r.files.length?`<div style="margin-top:9px"><div class="fl" style="margin-bottom:5px">المستندات الداعمة (${r.files.length})</div><div style="display:flex;flex-wrap:wrap;gap:7px">${r.files.map(f=>`<div onclick="prevF('${f.name}','${f.data}','${f.type||""}')" style="cursor:pointer;padding:5px 9px;background:rgba(255,255,255,0.05);border-radius:6px;font-size:11px;color:#e2e8f0">${f.type&&f.type.startsWith("image/")?`<img src="${f.data}" style="width:24px;height:24px;object-fit:cover;border-radius:3px;vertical-align:middle;margin-left:5px">`:"📄"} ${f.name}</div>`).join("")}</div></div>`:""}</div>`:`<div style="font-size:11px;color:#475569;padding:9px;background:rgba(255,255,255,0.02);border-radius:6px;margin-bottom:11px">لم يدوّن المشرف أكشن على الملاحظات الجوهرية</div>`;
  const scoreH=`<div class="card"><div class="ch"><div class="ct2">📊 النتيجة النهائية</div></div><div class="cb"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px"><div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:18px;font-weight:800;color:${sc(matchRate)}">${matchRate}%</div><div style="font-size:10px;color:#64748b">نسبة التوافق</div></div><div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:18px;font-weight:800;color:#2563eb">${accScore}</div><div style="font-size:10px;color:#64748b">دقة الرصد (70%)</div></div><div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:18px;font-weight:800;color:#7c3aed">${critScore}</div><div style="font-size:10px;color:#64748b">الجوهري (30%)</div></div><div style="text-align:center;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:18px;font-weight:800;color:${sc(supScore)}">${supScore}%</div><div style="font-size:10px;color:#64748b">نتيجة تقييم المشرف</div></div></div>${attachH}<div class="fg"><div class="fl">تقييم التعامل مع الجوهري (30%)</div><div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:6px">${critBtns}</div></div><div class="fg"><div class="fl">ملاحظات موظف الجودة</div><textarea class="fi" id="qa-notes" rows="2" placeholder="أضف ملاحظاتك..."></textarea></div><button class="btn bs" onclick="submitQA(${r.id},${supScore},${matchRate},${wrongCount},${qaFlat.length},${accScore},${critScore})" style="font-size:13px;padding:9px 22px">📤 إرسال لمشرف الجودة للاعتماد</button></div></div>`;
  document.getElementById("pgcontent").innerHTML=sumH+undH+scoreH;
}
function calcQAScore(r){
  const cr=CR[r.type]||CR.RMS1;const uSecs=cr.muatamad||[];
  const uFlat=uSecs.flatMap(s=>(r.uE[s.id]||[]).map(e=>({...e,sec:s})));
  const qaFlat=uSecs.flatMap(s=>(QS.undE[s.id]||[]));
  const wrongCount=Object.values(QS.verify).filter(v=>v==="no").length;
  const matchCount=uFlat.filter(e=>QS.verify[e.text]!=="no").length;
  const totalEv=uFlat.length+qaFlat.length;
  const matchRate=totalEv?Math.round(matchCount/totalEv*100):100;
  const accScore=Math.round(matchRate*0.7);
  const hasCrit=uSecs.some(s=>(r.uE[s.id]||[]).some(e=>e.impact==="R"))||(r.cCrit&&r.cCrit.length>0);
  const critScore=!hasCrit?30:QCA==="immediate"?30:QCA==="late"?15:0;
  return{supScore:accScore+critScore,matchRate,accScore,critScore,qaFlat,wrongCount};
}
function submitQA(id,supScore,matchRate,wrongCount,undetCount,accScore,critScore){const r=RECS.find(x=>x.id===id);if(!r)return;const notes=gv("qa-notes");r.trail.push({t:new Date().toISOString(),user:CU.name,action:"تقييم الجودة",supScore,matchRate});r.supScore=supScore;r.matchRate=matchRate;r.wrongCount=wrongCount;r.undetectedCount=undetCount;r.qaCritAction=QCA;r.qaVerify={...QS.verify};r.qaUndE={...QS.undE};r.qaOfficer=CU.name;r.qaDate=new Date().toISOString();r.qaNotes=notes;save();updateToSheets_record(r);addLog("إرسال تقييم الجودة",`رقم ${r.rno} — نتيجة تقييم المشرف: ${supScore}%`,id);toast("✅ تم الإرسال لمشرف الجودة");pgMyCases();}
function prevF(name,data,type){const isImg=type&&type.startsWith("image/");const m=document.createElement("div");m.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer";m.onclick=()=>m.remove();m.innerHTML=isImg?`<div style="max-width:90%;max-height:90%;text-align:center"><img src="${data}" style="max-width:100%;max-height:80vh;border-radius:8px"><div style="color:#94a3b8;font-size:12px;margin-top:9px">${name}</div></div>`:`<div style="background:#1e293b;border-radius:11px;padding:22px;text-align:center"><div style="font-size:44px;margin-bottom:11px">📄</div><div style="color:#e2e8f0;font-size:13px;margin-bottom:14px">${name}</div><a href="${data}" download="${name}" style="color:#60a5fa;font-size:12px">⬇️ تحميل</a></div>`;document.body.appendChild(m);}

function pgApprovals(){
  const recs=RECS.filter(r=>["qa_review","sup_obj"].includes(r.status)).sort((a,b)=>b.id-a.id);
  const rows=recs.map(r=>`<tr><td><strong style="color:#93c5fd">${r.rno}</strong><button class="cpb" onclick="cpT('${r.rno}')">📋</button></td><td>${tbdg(r.type)}</td><td>${r.supName||"—"}</td><td>${r.qaName||"—"}</td><td>${pill(r.uScore)}</td><td>${pill(r.supScore)}</td><td>${r.matchRate!=null?`<span style="color:${sc(r.matchRate)};font-weight:700">${r.matchRate}%</span>`:"—"}</td><td>${sbdg(r.status)}</td><td>
    <button class="btn bg btn-xs" onclick="openDet(${r.id})" style="margin-left:3px">🔍</button>
    ${r.status==="qa_review"?`<button class="btn bs btn-xs" onclick="approveRec(${r.id})" style="margin-left:3px">✅</button><button class="btn bw btn-xs" onclick="openReturn(${r.id})">↩️</button>`:""}
    ${r.status==="sup_obj"?`<button class="btn bp btn-xs" onclick="openObjDec(${r.id})">⚖️ البت</button>`:""}
  </td></tr>`).join("")||`<tr><td colspan="9" style="text-align:center;padding:36px;color:#475569">لا توجد تقييمات بانتظار الاعتماد ✅</td></tr>`;
  document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">⏳ بانتظار الاعتماد (${recs.length})</div></div><div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>المشرف</th><th>موظف الجودة</th><th>نتيجة التقييم</th><th>نتيجة تقييم المشرف</th><th>نسبة التوافق</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function approveRec(id){if(!confirm("اعتماد هذا التقييم نهائياً؟"))return;const r=RECS.find(x=>x.id===id);if(!r)return;r.status="approved";r.approvedBy=CU.name;r.approvedAt=new Date().toISOString();r.trail.push({t:new Date().toISOString(),user:CU.name,action:"اعتماد نهائي",note:""});save();updateToSheets_record(r);addLog("اعتماد تقييم",`اعتماد رقم ${r.rno}`,id);toast("✅ تم الاعتماد النهائي");pgApprovals();}
function openReturn(id){openModal("↩️ إعادة التقييم",`<div style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);color:#fca5a5;padding:9px 13px;border-radius:7px;font-size:11px;margin-bottom:12px">⚠️ سيتم إعادة هذا التقييم لموظف الجودة مع ملاحظاتك</div><div class="fg"><div class="fl">سبب الإعادة</div><textarea class="fi" id="ret-r" rows="4" placeholder="اكتب سبب الإعادة..."></textarea></div><button class="btn bw" style="width:100%" onclick="returnRec(${id})">↩️ إعادة</button>`);}
function returnRec(id){const reason=gv("ret-r");if(!reason){toast("اكتب السبب","#dc2626");return;}const r=RECS.find(x=>x.id===id);if(!r)return;r.status="returned";r.trail.push({t:new Date().toISOString(),user:CU.name,action:"إعادة التقييم",note:reason});save();updateToSheets_record(r);closeModal();toast("↩️ تم الإعادة","#ca8a04");pgApprovals();}
function openObjDec(id){const r=RECS.find(x=>x.id===id);if(!r)return;openModal("⚖️ البت في اعتراض المشرف",`<div style="border-radius:9px;padding:13px;border:1.5px solid rgba(220,38,38,0.4);background:rgba(220,38,38,0.06);margin-bottom:13px"><div style="font-size:11px;font-weight:700;color:#fca5a5;margin-bottom:7px">اعتراض المشرف — ${r.supObj?.user||""}</div><div style="font-size:12px;color:#e2e8f0;background:rgba(255,255,255,0.03);border-radius:6px;padding:9px">${r.supObj?.reason||""}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px"><div style="padding:9px;background:rgba(255,255,255,0.03);border-radius:7px"><div class="fl" style="margin-bottom:4px">نتيجة تقييم المشرف</div><div style="font-size:20px;font-weight:800;color:${sc(r.supScore||0)}">${r.supScore||0}%</div></div><div style="padding:9px;background:rgba(255,255,255,0.03);border-radius:7px"><div class="fl" style="margin-bottom:4px">نسبة التوافق</div><div style="font-size:20px;font-weight:800;color:${sc(r.matchRate||0)}">${r.matchRate||0}%</div></div></div><div class="fg"><div class="fl">القرار والسبب</div><textarea class="fi" id="od-n" rows="3" placeholder="اكتب قرارك وسببه..."></textarea></div><div style="display:flex;gap:8px"><button class="btn bs" style="flex:1" onclick="decideObj(${id},'accept')">✅ قبول الاعتراض</button><button class="btn bd" style="flex:1" onclick="decideObj(${id},'reject')">❌ رفض الاعتراض</button></div>`,"700px");}
function decideObj(id,dec){const note=gv("od-n");if(!note){toast("اكتب القرار والسبب","#dc2626");return;}const r=RECS.find(x=>x.id===id);if(!r)return;r.objDecision={dec,note,date:new Date().toISOString(),by:CU.name};r.status=dec==="accept"?"submitted":"approved";r.trail.push({t:new Date().toISOString(),user:CU.name,action:dec==="accept"?"قبول اعتراض المشرف":"رفض اعتراض المشرف",note});save();updateToSheets_record(r);closeModal();toast(dec==="accept"?"✅ تم قبول الاعتراض":"❌ تم رفض الاعتراض",dec==="accept"?"#16a34a":"#dc2626");pgApprovals();}

function pgMyObj(){const my=RECS.filter(r=>r.invObj&&(r.madkhalName===CU.name||r.muatamadName===CU.name));const rows=my.map(r=>`<tr><td><strong style="color:#93c5fd">${r.rno}</strong></td><td>${tbdg(r.type)}</td><td><div style="font-size:11px;max-width:180px;color:#a78bfa">${r.invObj?.reason||""}</div></td><td>${r.invObj?.reply?`<span style="color:${r.invObj.reply.dec==="accept"?"#16a34a":"#dc2626"};font-weight:700">${r.invObj.reply.dec==="accept"?"✅ مقبول":"❌ مرفوض"}</span>`:"⏳ قيد المراجعة"}</td><td>${r.invObj?.reply?`<div style="font-size:11px;color:#94a3b8;max-width:180px">${r.invObj.reply.reply}</div>`:"—"}</td></tr>`).join("")||`<tr><td colspan="5" style="text-align:center;padding:36px;color:#475569">لا توجد اعتراضات</td></tr>`;document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">⚠️ اعتراضاتي (${my.length})</div></div><div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>سبب الاعتراض</th><th>القرار</th><th>رد المشرف</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}
function openInvObj(id){openModal("⚠️ اعتراض على التقييم",`<div style="background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.3);color:#93c5fd;padding:9px 13px;border-radius:7px;font-size:11px;margin-bottom:12px">ℹ️ سيُرسل اعتراضك للمشرف المسؤول للرد عليه</div><div class="fg"><div class="fl">سبب الاعتراض</div><textarea class="fi" id="io-r" rows="4" placeholder="اكتب سبب اعتراضك..."></textarea></div><button class="btn bw" style="width:100%" onclick="submitInvObj(${id})">⚠️ تقديم الاعتراض</button>`);}
function submitInvObj(id){const reason=gv("io-r");if(!reason){toast("اكتب سبب الاعتراض","#dc2626");return;}const r=RECS.find(x=>x.id===id);if(!r)return;r.invObj={reason,date:new Date().toISOString(),user:CU.name};r.status="inv_obj";r.trail.push({t:new Date().toISOString(),user:CU.name,action:"اعتراض المحقق",note:reason});save();updateToSheets_record(r);closeModal();toast("✅ تم تقديم الاعتراض");pgMyResults();}

// ═══ COMMON ═══
function pgAllRecs(){const recs=RECS.slice().sort((a,b)=>b.id-a.id);const rows=recs.map(r=>`<tr><td><strong style="color:#93c5fd">${r.rno}</strong><button class="cpb" onclick="cpT('${r.rno}')">📋</button></td><td>${tbdg(r.type)}</td><td>${r.supName||"—"}</td><td>${r.muatamadName||"—"}</td><td>${pill(r.mScore)}</td><td>${pill(r.uScore)}</td><td>${pill(r.cScore)}</td><td>${pill(r.supScore)}</td><td>${sbdg(r.status)}</td><td><button class="btn bg btn-xs" onclick="openDet(${r.id})">🔍</button></td></tr>`).join("")||`<tr><td colspan="10" style="text-align:center;padding:36px;color:#475569">لا توجد سجلات</td></tr>`;document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">📋 سجل التقييمات (${recs.length})</div></div><div class="twrap"><table><thead><tr><th>رقم الحالة</th><th>النوع</th><th>المشرف</th><th>المعتمد</th><th>المدخل%</th><th>نتيجة التقييم</th><th>مكالمة%</th><th>نتيجة تقييم المشرف</th><th>الحالة</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}

function openDet(id){
  const r=RECS.find(x=>x.id===id);if(!r)return;
  const cr=CR[r.type]||CR.RMS1;const uSecs=cr.muatamad||[];
  const uFlat=uSecs.flatMap(s=>(r.uE[s.id]||[]).map(e=>({...e,sec:s})));
  const qaFlat=uSecs.flatMap(s=>(r.qaUndE?r.qaUndE[s.id]||[]:[]));
  let body=`<div style="display:flex;gap:7px;margin-bottom:11px">${tbdg(r.type)} ${sbdg(r.status)}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
    <div><div class="fl">المشرف</div><div style="font-size:12px;color:#e2e8f0;margin-top:3px">${r.supName||"—"}</div></div>
    <div><div class="fl">موظف الجودة</div><div style="font-size:12px;color:#e2e8f0;margin-top:3px">${r.qaName||"—"}</div></div>
    ${r.madkhalName?`<div><div class="fl">المدخل</div><div style="font-size:12px;color:#e2e8f0;margin-top:3px">${r.madkhalName}${r.madkhalEid?" ("+r.madkhalEid+")":""}</div></div>`:""}
    <div><div class="fl">المعتمد</div><div style="font-size:12px;color:#e2e8f0;margin-top:3px">${r.muatamadName||"—"}${r.muatamadEid?" ("+r.muatamadEid+")":""}</div></div>
    ${r.callName?`<div><div class="fl">${cr.hasVideo?"الفيديو":"المكالمة"}</div><div style="font-size:12px;color:#e2e8f0;margin-top:3px">${r.callName}</div></div>`:""}
  </div>
  <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px">
    ${r.mScore!=null?`<div style="text-align:center;flex:1;min-width:70px;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:17px;font-weight:800;color:${sc(r.mScore)}">${r.mScore}%</div><div style="font-size:10px;color:#64748b">المدخل</div></div>`:""}
    <div style="text-align:center;flex:1;min-width:70px;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:17px;font-weight:800;color:${sc(r.uScore)}">${r.uScore}%</div><div style="font-size:10px;color:#64748b">نتيجة تقييم المحقق</div></div>
    ${r.cScore!=null?`<div style="text-align:center;flex:1;min-width:70px;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:17px;font-weight:800;color:${sc(r.cScore)}">${r.cScore}%</div><div style="font-size:10px;color:#64748b">${cr.hasVideo?"الفيديو":"المكالمة"}</div></div>`:""}
    ${r.supScore!=null?`<div style="text-align:center;flex:1;min-width:70px;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:17px;font-weight:800;color:${sc(r.supScore)}">${r.supScore}%</div><div style="font-size:10px;color:#64748b">نتيجة تقييم المشرف</div></div>`:""}
    ${r.matchRate!=null?`<div style="text-align:center;flex:1;min-width:70px;background:rgba(255,255,255,0.03);border-radius:7px;padding:10px;border:1px solid rgba(255,255,255,0.07)"><div style="font-size:17px;font-weight:800;color:${sc(r.matchRate)}">${r.matchRate}%</div><div style="font-size:10px;color:#64748b">نسبة التوافق</div></div>`:""}
  </div>`;
  if(uFlat.length){body+=`<div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;margin:13px 0 9px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.07)">ملاحظات المعتمد</div>`;uFlat.forEach(e=>{const crossed=r.qaVerify&&r.qaVerify[e.text]==="no";body+=`<div style="font-size:11px;padding:4px 8px;border-radius:4px;margin-bottom:3px;color:${IMP[e.impact].c};background:${IMP[e.impact].bg};border-right:3px solid ${IMP[e.impact].c};${crossed?"opacity:.4;text-decoration:line-through":""}">${IMP[e.impact].e} ${e.text}${crossed?" <small>(غير صحيحة)</small>":""}</div>`;});}
  if(qaFlat.length){body+=`<div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;margin:13px 0 9px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.07)">ملاحظات الجودة المضافة</div>`;qaFlat.forEach(e=>{body+=`<div style="font-size:11px;padding:4px 8px;border-radius:4px;margin-bottom:3px;color:${IMP[e.impact].c};background:${IMP[e.impact].bg};border-right:3px solid ${IMP[e.impact].c}">🆕 ${IMP[e.impact].e} ${e.text}</div>`;});}
  if(r.corrective)body+=`<div style="margin-top:9px"><div class="fl">الإجراء التصحيحي</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">${r.corrective}</div></div>`;
  if(r.invObj)body+=`<div style="border-radius:9px;padding:13px;border:1.5px solid rgba(124,58,237,0.4);background:rgba(124,58,237,0.06);margin-top:11px"><div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:7px">⚠️ اعتراض المحقق</div><div style="font-size:12px;color:#e2e8f0;background:rgba(255,255,255,0.03);border-radius:6px;padding:9px">${r.invObj.reason}</div>${r.invObj.reply?`<div style="margin-top:7px;font-size:11px;color:${r.invObj.reply.dec==="accept"?"#86efac":"#fca5a5"}">رد المشرف: ${r.invObj.reply.dec==="accept"?"✅ مقبول":"❌ مرفوض"} — ${r.invObj.reply.reply}</div>`:"<div style='margin-top:5px;font-size:10px;color:#64748b'>قيد المراجعة</div>"}</div>`;
  if(r.supObj)body+=`<div style="border-radius:9px;padding:13px;border:1.5px solid rgba(220,38,38,0.4);background:rgba(220,38,38,0.06);margin-top:11px"><div style="font-size:11px;font-weight:700;color:#fca5a5;margin-bottom:7px">⚠️ اعتراض المشرف على الجودة</div><div style="font-size:12px;color:#e2e8f0;background:rgba(255,255,255,0.03);border-radius:6px;padding:9px">${r.supObj.reason}</div>${r.objDecision?`<div style="margin-top:7px;font-size:11px;color:${r.objDecision.dec==="accept"?"#86efac":"#fca5a5"}">قرار مشرف الجودة: ${r.objDecision.dec==="accept"?"✅ مقبول":"❌ مرفوض"} — ${r.objDecision.note}</div>`:"<div style='margin-top:5px;font-size:10px;color:#64748b'>قيد النظر</div>"}</div>`;
  if(r.trail&&r.trail.length){body+=`<div style="font-size:10px;font-weight:700;color:#64748b;letter-spacing:1px;margin:13px 0 9px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.07)">سجل التعديلات</div><div style="display:flex;flex-direction:column;gap:0">`;r.trail.forEach((a,i)=>{const c2=a.action.includes("اعتراض")?"#ca8a04":a.action.includes("اعتماد")?"#16a34a":a.action.includes("إعادة")?"#dc2626":"#2563eb";body+=`<div style="display:flex;gap:11px;padding-bottom:13px;position:relative">${i<r.trail.length-1?`<div style="position:absolute;right:4px;top:12px;bottom:0;width:2px;background:rgba(255,255,255,0.08)"></div>`:""}<div style="width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;background:${c2};position:relative;z-index:1"></div><div><div style="font-size:11px;font-weight:700;color:#e2e8f0;margin-bottom:2px">${a.action}${a.supScore!=null?" — نتيجة تقييم المشرف: "+a.supScore+"%":""}</div><div style="font-size:10px;color:#64748b">${a.user} · ${new Date(a.t).toLocaleDateString("ar")} ${new Date(a.t).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"})}</div>${a.note?`<div style="font-size:11px;color:#94a3b8;margin-top:2px">${a.note}</div>`:""}</div></div>`;});body+="</div>";}
  openModal("تفاصيل — "+r.rno,body,"720px");
}

// ═══ DASHBOARD ═══
function pgDash(){
  const total=RECS.length;const evRecs=RECS.filter(r=>r.supScore!=null);
  const approved=RECS.filter(r=>r.status==="approved").length;
  const pending=RECS.filter(r=>r.status==="submitted").length;
  const objCount=RECS.filter(r=>["inv_obj","sup_obj"].includes(r.status)).length;
  const avgU=total?Math.round(RECS.reduce((s,r)=>s+r.uScore,0)/total):0;
  const avgSup=evRecs.length?Math.round(evRecs.reduce((s,r)=>s+r.supScore,0)/evRecs.length):0;
  const avgMatch=evRecs.filter(r=>r.matchRate!=null).length?Math.round(evRecs.filter(r=>r.matchRate!=null).reduce((s,r)=>s+r.matchRate,0)/evRecs.filter(r=>r.matchRate!=null).length):0;
  const rms1=RECS.filter(r=>r.type==="RMS1").length,rms2=RECS.filter(r=>r.type==="RMS2").length,field=RECS.filter(r=>r.type==="FIELD").length;
  const compliance=total?Math.round(RECS.filter(r=>r.uScore>=75).length/total*100):0;
  const noErrs=RECS.filter(r=>Object.values(r.uE||{}).every(arr=>arr.length===0)).length;
  const kpis=[
    {i:"📋",l:"إجمالي الحالات المقيّمة",v:total,s:`${pending} بانتظار الجودة`,c:"#2563eb"},
    {i:"✅",l:"المعتمدة نهائياً",v:approved,s:`${total?Math.round(approved/total*100):0}% من الإجمالي`,c:"#16a34a"},
    {i:"📊",l:"متوسط نتيجة تقييم المحقق",v:total?avgU+"%":"—",s:sl(avgU),c:sc(avgU)},
    {i:"🎯",l:"متوسط نتيجة تقييم المشرف",v:evRecs.length?avgSup+"%":"—",s:`${evRecs.length} مُقيَّم`,c:evRecs.length?sc(avgSup):"#475569"},
    {i:"🤝",l:"نسبة التوافق",v:avgMatch?avgMatch+"%":"—",s:"دقة رصد المشرف",c:avgMatch?sc(avgMatch):"#475569"},
    {i:"🎯",l:"نسبة الالتزام بمعايير الجودة",v:total?compliance+"%":"—",s:"المحققون ≥75%",c:sc(compliance)},
    {i:"⭐",l:"الحالات الخالية من الملاحظات",v:noErrs,s:`${total?Math.round(noErrs/total*100):0}%`,c:"#16a34a"},
    {i:"⚠️",l:"الاعتراضات النشطة",v:objCount,s:"اعتراض نشط",c:"#7c3aed"},
  ];
  let kpiH="";kpis.forEach(k=>{kpiH+=`<div style="background:#1e293b;border-radius:10px;padding:13px;border:1px solid rgba(255,255,255,0.07);position:relative;overflow:hidden"><div style="position:absolute;top:0;right:0;width:3px;height:100%;background:${k.c}"></div><div style="font-size:19px;margin-bottom:6px">${k.i}</div><div style="font-size:10px;color:#64748b;font-weight:600;margin-bottom:3px">${k.l}</div><div style="font-size:22px;font-weight:800;color:${k.c}">${k.v}</div><div style="font-size:10px;color:#475569;margin-top:2px">${k.s}</div></div>`;});
  const em={};RECS.forEach(r=>{(CR[r.type]?.muatamad||[]).forEach(s=>{(r.uE[s.id]||[]).forEach(e=>{em[e.text]=em[e.text]||{c:0,impact:e.impact};em[e.text].c++;});});});
  const top=Object.entries(em).sort((a,b)=>b[1].c-a[1].c).slice(0,6);const m3=Math.max(...top.map(e=>e[1].c),1);
  let errH=top.map(([t,d])=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="font-size:10px;color:#64748b;min-width:95px;text-align:right;flex-shrink:0" title="${t}">${t.length>18?t.substring(0,18)+"..":t}</div><div style="flex:1;height:16px;background:rgba(255,255,255,0.05);border-radius:7px;overflow:hidden;position:relative"><div style="height:100%;border-radius:7px;width:${Math.round(d.c/m3*100)}%;background:${IMP[d.impact].c}"><span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff">${d.c}</span></div></div><div style="font-size:10px;min-width:20px">${IMP[d.impact].e}</div></div>`).join("")||`<div style="text-align:center;padding:18px;color:#475569">لا توجد بيانات</div>`;
  const byType=[{l:"RMS 1.0",c:rms1,col:"#2563eb"},{l:"RMS 2.0",c:rms2,col:"#7c3aed"},{l:"Field",c:field,col:"#16a34a"}];const mxR=Math.max(...byType.map(x=>x.c),1);
  let typeH=byType.map(x=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><div style="font-size:10px;color:#64748b;min-width:55px;text-align:right;flex-shrink:0">${x.l}</div><div style="flex:1;height:16px;background:rgba(255,255,255,0.05);border-radius:7px;overflow:hidden;position:relative"><div style="height:100%;border-radius:7px;width:${Math.round(x.c/mxR*100)}%;background:${x.col}"><span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff">${x.c}</span></div></div><div style="font-size:10px;font-weight:700;min-width:30px;color:${x.col}">${total?Math.round(x.c/total*100):0}%</div></div>`).join("");
  const recent=RECS.slice(-5).reverse();const recentRows=recent.map(r=>`<tr><td>${tbdg(r.type)}</td><td><strong style="color:#93c5fd">${r.rno}</strong></td><td>${r.supName||"—"}</td><td>${pill(r.uScore)}</td><td>${pill(r.supScore)}</td><td>${sbdg(r.status)}</td><td><button class="btn bg btn-xs" onclick="openDet(${r.id})">🔍</button></td></tr>`).join("")||`<tr><td colspan="7" style="text-align:center;padding:28px;color:#475569">لا توجد تقييمات</td></tr>`;
  document.getElementById("pgcontent").innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px">${kpiH}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px"><div class="card"><div class="ch"><div class="ct2">📊 توزيع الحالات حسب النوع</div></div><div class="cb">${typeH}</div></div><div class="card"><div class="ch"><div class="ct2">🔁 أبرز الملاحظات المتكررة</div></div><div class="cb">${errH}</div></div></div><div class="card"><div class="ch"><div class="ct2">📋 أحدث التقييمات المنجزة</div></div><div class="twrap"><table><thead><tr><th>النوع</th><th>رقم الحالة</th><th>المشرف</th><th>نتيجة تقييم المحقق</th><th>نتيجة تقييم المشرف</th><th>الحالة</th><th></th></tr></thead><tbody>${recentRows}</tbody></table></div></div>`;
}

// ═══ COMPARE & AUDIT ═══
function pgCompare(){const supMap={};RECS.filter(r=>r.supScore!=null).forEach(r=>{const s=r.supName||"غير محدد";if(!supMap[s])supMap[s]={scores:[],match:[]};supMap[s].scores.push(r.supScore);if(r.matchRate!=null)supMap[s].match.push(r.matchRate);});let rows="";Object.entries(supMap).forEach(([n,d])=>{const avg=Math.round(d.scores.reduce((s,x)=>s+x,0)/d.scores.length);const ma=d.match.length?Math.round(d.match.reduce((s,x)=>s+x,0)/d.match.length):null;rows+=`<tr><td><strong>${n}</strong></td><td style="text-align:center">${d.scores.length}</td><td style="text-align:center">${pill(avg)}</td><td style="text-align:center">${ma!=null?`<span style="color:${sc(ma)};font-weight:700">${ma}%</span>`:"—"}</td></tr>`;});if(!rows)rows=`<tr><td colspan="4" style="text-align:center;padding:20px;color:#475569">لا توجد بيانات</td></tr>`;document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">👨‍💼 مقارنة أداء المشرفين</div></div><div class="twrap"><table><thead><tr><th>المشرف</th><th>عدد الحالات</th><th>متوسط نتيجة تقييم المشرف</th><th>متوسط نسبة التوافق</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}
function pgAudit(){const rows=ALOG.map((a,i)=>`<div style="display:flex;gap:11px;padding-bottom:13px;position:relative">${i<ALOG.length-1?`<div style="position:absolute;right:4px;top:12px;bottom:0;width:2px;background:rgba(255,255,255,0.08)"></div>`:""}<div style="width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px;background:${a.action.includes("اعتراض")?"#ca8a04":a.action.includes("اعتماد")?"#16a34a":a.action.includes("إعادة")?"#dc2626":"#2563eb"};position:relative;z-index:1"></div><div style="flex:1"><div style="font-size:11px;font-weight:700;color:#e2e8f0;margin-bottom:2px">${a.action}</div><div style="font-size:10px;color:#64748b">${a.user} · ${new Date(a.t).toLocaleDateString("ar")} ${new Date(a.t).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"})}</div><div style="font-size:11px;color:#94a3b8;margin-top:2px">${a.detail}</div></div></div>`).join("")||`<div style="text-align:center;padding:36px;color:#475569"><div style="font-size:34px;margin-bottom:9px">📭</div><p>لا توجد عمليات</p></div>`;document.getElementById("pgcontent").innerHTML=`<div class="card"><div class="ch"><div class="ct2">🔍 سجل التعديلات</div><button class="btn bg btn-sm" onclick="ALOG=[];saveLog();pgAudit()">مسح</button></div><div class="cb" style="padding:16px"><div style="display:flex;flex-direction:column;gap:0">${rows}</div></div></div>`;}
function exportData(){const blob=new Blob([JSON.stringify({records:RECS,audit:ALOG,exportDate:new Date().toISOString()},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="RMS_"+new Date().toISOString().split("T")[0]+".json";a.click();}

</script>
